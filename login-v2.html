<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data:; font-src 'self'; frame-ancestors 'none';">
  <title>Sign In — Road Visit Tracker</title>
  <style>
    :root {
      --bg:       #0a0a0a;
      --surface:  #1a1a1a;
      --surface2: #222;
      --gold:     #C9A84C;
      --text:     #e8e8e8;
      --text-dim: #888;
      --border:   #2a2a2a;
      --error:    #e05c5c;
      --success:  #50c878;
      --radius:   10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-family: Georgia, serif;
      font-size: 1.6rem;
      color: var(--gold);
      letter-spacing: 0.5px;
    }

    .logo p {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-top: 6px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }

    .tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 12px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--gold); }

    #name-group { display: none; }

    .btn-primary {
      width: 100%;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: var(--radius);
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .btn-primary:hover   { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-oauth {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 12px;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-oauth:hover { border-color: var(--gold); background: #1e1e1e; }
    .btn-oauth:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg, .success-msg {
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg {
      background: rgba(224, 92, 92, 0.1);
      border: 1px solid rgba(224, 92, 92, 0.3);
      color: var(--error);
    }

    .success-msg {
      background: rgba(80, 200, 120, 0.1);
      border: 1px solid rgba(80, 200, 120, 0.3);
      color: var(--success);
    }

    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>Road Visit Tracker</h1>
    <p>Sign in to access your data</p>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="signin">Sign In</div>
    <div class="tab" data-tab="signup">Create Account</div>
  </div>

  <div id="error-msg"   class="error-msg"></div>
  <div id="success-msg" class="success-msg"></div>

  <div id="name-group" class="form-group">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Your full name" autocomplete="name" />
  </div>
  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>

  <button class="btn-primary" id="submit-btn">Sign In</button>

  <div class="divider">or continue with</div>

  <button class="btn-oauth" id="google-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <button class="btn-oauth" id="microsoft-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="#F25022" d="M1 1h10v10H1z"/>
      <path fill="#00A4EF" d="M13 1h10v10H13z"/>
      <path fill="#7FBA00" d="M1 13h10v10H1z"/>
      <path fill="#FFB900" d="M13 13h10v10H13z"/>
    </svg>
    Continue with Microsoft
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"
        integrity="sha384-rwykjmWNwVxboyFmvK9OXN0wj9hnMHA2aAHtits54DuACyCq0M2PrSNxhRb+hvXT"
        crossorigin="anonymous"></script>
<script type="module">
  import { Auth, db } from './supabase-client-v2.js';

  const REDIRECT_URL = 'https://m-talal-ai.github.io/road-visit-tracker/login-v2.html';

  // ── Detect invite join token in URL ─────────────────────────
  const _joinToken = new URLSearchParams(window.location.search).get('join');
  if (_joinToken) {
    try {
      const _locData = JSON.parse(decodeURIComponent(escape(atob(_joinToken))));
      // Store token so index-v2 can process it after auth
      localStorage.setItem('rvt_pending_join', _joinToken);
      // Show invite banner above the tabs
      const banner = document.createElement('div');
      banner.style.cssText = 'background:rgba(201,168,76,0.12);border:1px solid var(--gold-dim);border-radius:var(--radius);padding:0.7rem 1rem;margin-bottom:1.1rem;font-size:0.85rem;color:var(--gold);text-align:center;line-height:1.5;';
      banner.innerHTML = '🔗 You\'ve been invited to join<br><strong>' + _locData.name + '</strong><br><span style="font-size:0.75rem;opacity:0.75">Sign in or create an account below to accept</span>';
      const card = document.querySelector('.card');
      const tabs = card.querySelector('.tabs');
      card.insertBefore(banner, tabs);
      // Default to sign-up tab since they likely don't have an account
      const signupTab = document.querySelector('[data-tab="signup"]');
      if (signupTab) signupTab.click();
    } catch(e) {}
  }

  // ── If already signed in, go straight to the app ────────────
  const { data: { session } } = await db.auth.getSession();
  if (session) window.location.replace('index-v3.html');

  // ── After OAuth redirect, Supabase detects token in URL ──────
  db.auth.onAuthStateChange((event, session) => {
    if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
      window.location.replace('index-v3.html');
    }
  });

  // ── Tab toggle (Sign In / Create Account) ────────────────────
  let mode = 'signin';

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      mode = tab.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('submit-btn').textContent =
        mode === 'signin' ? 'Sign In' : 'Create Account';
      document.getElementById('name-group').style.display =
        mode === 'signup' ? 'block' : 'none';
      clearMessages();
    });
  });

  // ── Message helpers ──────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }

  function clearMessages() {
    document.getElementById('error-msg').style.display   = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }

  function setLoading(btn, loading, label) {
    btn.disabled    = loading;
    btn.textContent = loading ? 'Please wait…' : label;
  }

  // ── Email / Password ─────────────────────────────────────────
  document.getElementById('submit-btn').addEventListener('click', async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const name     = document.getElementById('name').value.trim();
    const btn      = document.getElementById('submit-btn');
    const label    = mode === 'signin' ? 'Sign In' : 'Create Account';

    if (!email || !password) { showError('Please enter your email and password.'); return; }
    if (mode === 'signup' && password.length < 8) {
      showError('Password must be at least 8 characters.');
      return;
    }

    clearMessages();
    setLoading(btn, true, label);

    try {
      if (mode === 'signin') {
        await Auth.signIn(email, password);
        // onAuthStateChange handles redirect
      } else {
        await Auth.signUp(email, password, name);
        showSuccess('Account created! Check your email to confirm, then sign in.');
      }
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading(btn, false, label);
    }
  });

  // ── Google OAuth ─────────────────────────────────────────────
  document.getElementById('google-btn').addEventListener('click', async () => {
    const btn = document.getElementById('google-btn');
    btn.disabled = true;
    try {
      await db.auth.signInWithOAuth({
        provider: 'google',
        options:  { redirectTo: REDIRECT_URL },
      });
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
    }
  });

  // ── Microsoft OAuth ──────────────────────────────────────────
  document.getElementById('microsoft-btn').addEventListener('click', async () => {
    const btn = document.getElementById('microsoft-btn');
    btn.disabled = true;
    try {
      await db.auth.signInWithOAuth({
        provider: 'azure',
        options:  { redirectTo: REDIRECT_URL, scopes: 'email profile openid' },
      });
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
    }
  });

  // ── Enter key triggers submit ────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('submit-btn').click();
  });
</script>

</body>
</html>
