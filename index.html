<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Road Visit Tracker</title>
  <style>
    /* ── Custom Properties ─────────────────────────────────── */
    :root {
      --bg:           #0a0a0a;
      --surface:      #1a1a1a;
      --surface-2:    #222222;
      --gold:         #C9A84C;
      --gold-dim:     #8a6f2e;
      --gold-subtle:  rgba(201,168,76,0.08);
      --text:         #e8e4d9;
      --text-muted:   #7a7060;
      --border:       rgba(201,168,76,0.22);
      --border-hover: rgba(201,168,76,0.60);
      --danger:       #c0392b;
      --danger-dim:   rgba(192,57,43,0.15);
      --radius:       7px;
      --radius-lg:    10px;
      --transition:   0.2s ease;
      --font-serif:   Georgia,'Times New Roman',serif;
      --font-body:    system-ui,-apple-system,sans-serif;
      --header-h:     60px;
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:15px; line-height:1.6; min-height:100vh; }
    button { cursor:pointer; font-family:inherit; font-size:inherit; }
    input,textarea,select { font-family:inherit; font-size:inherit; color:var(--text); }
    ul { list-style:none; }

    /* ── Header ────────────────────────────────────────────── */
    .app-header {
      position:sticky; top:0; z-index:100;
      height:var(--header-h);
      background:rgba(10,10,10,0.93);
      backdrop-filter:blur(8px);
      border-bottom:1px solid var(--gold-dim);
      display:flex; align-items:center;
      padding:0 1.25rem; gap:0.75rem;
    }
    .app-title { font-family:var(--font-serif); font-size:1.15rem; font-weight:normal; color:var(--gold); letter-spacing:0.05em; white-space:nowrap; }
    .header-divider { width:1px; height:1.4rem; background:var(--gold-dim); opacity:0.5; flex-shrink:0; }
    .breadcrumb { display:flex; align-items:center; gap:0.4rem; flex:1; overflow:hidden; min-width:0; }
    .bc-sep { color:var(--gold-dim); font-size:0.8rem; flex-shrink:0; }
    .bc-item { color:var(--text-muted); font-size:0.8rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bc-item.link { color:var(--gold); cursor:pointer; flex-shrink:0; }
    .bc-item.link:hover { text-decoration:underline; }
    .header-search {
      width:180px; flex-shrink:0;
      background:var(--surface-2); border:1px solid var(--border);
      border-radius:var(--radius); padding:0.35rem 0.7rem;
      color:var(--text); font-size:0.82rem; transition:border-color var(--transition);
    }
    .header-search:focus { outline:none; border-color:var(--gold); }
    .header-search::placeholder { color:var(--text-muted); }
    .view-toggle-group { display:flex; gap:0.2rem; flex-shrink:0; }
    .vtbtn {
      background:transparent; border:1px solid var(--border);
      color:var(--text-muted); border-radius:var(--radius);
      padding:0.3rem 0.5rem; font-size:1rem; line-height:1;
      transition:all var(--transition);
    }
    .vtbtn:hover { border-color:var(--border-hover); color:var(--gold); }
    .vtbtn.active { background:var(--gold-subtle); border-color:var(--border-hover); color:var(--gold); }
    .settings-btn { background:transparent; border:1px solid var(--border); color:var(--text-muted); border-radius:var(--radius); padding:0.3rem 0.5rem; font-size:1rem; transition:all var(--transition); flex-shrink:0; }
    .settings-btn:hover { border-color:var(--gold); color:var(--gold); }

    /* ── Main ───────────────────────────────────────────────── */
    main { max-width:960px; margin:0 auto; padding:2rem 1.5rem 4rem; }

    /* ── View Header ─────────────────────────────────────────── */
    .view-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; gap:1rem; flex-wrap:wrap; }
    .view-title { font-family:var(--font-serif); font-size:1.5rem; font-weight:normal; color:var(--text); }
    .view-title-sub { font-size:0.8rem; color:var(--text-muted); display:block; margin-top:0.1rem; }
    .view-actions { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn { display:inline-flex; align-items:center; gap:0.35rem; padding:0.45rem 1rem; border-radius:var(--radius); border:1px solid transparent; font-size:0.875rem; transition:all var(--transition); white-space:nowrap; }
    .btn-primary { background:var(--gold); color:#0a0a0a; border-color:var(--gold); font-weight:600; }
    .btn-primary:hover { background:#d9b85c; border-color:#d9b85c; }
    .btn-ghost { background:transparent; color:var(--gold); border-color:var(--border-hover); }
    .btn-ghost:hover { background:var(--gold-subtle); }
    .btn-danger { background:transparent; color:var(--danger); border-color:rgba(192,57,43,0.4); }
    .btn-danger:hover { background:var(--danger-dim); }
    .btn-sm { padding:0.3rem 0.65rem; font-size:0.78rem; }
    .btn:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }

    /* ── Card Grid ───────────────────────────────────────────── */
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:1.1rem; }

    /* ── Item Card (places + roads) ──────────────────────────── */
    .item-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:1rem 1rem 0.85rem;
      cursor:pointer; transition:all var(--transition);
      display:flex; flex-direction:column; gap:0.4rem; position:relative;
    }
    .item-card:hover { border-color:var(--border-hover); transform:translateY(-2px); box-shadow:0 6px 24px rgba(201,168,76,0.07); }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem; }
    .card-name { font-family:var(--font-serif); font-size:1rem; color:var(--text); line-height:1.3; flex:1; }
    .card-actions { display:flex; gap:0.2rem; flex-shrink:0; }
    .icon-btn { background:transparent; border:none; padding:0.2rem 0.3rem; border-radius:4px; color:var(--text-muted); font-size:0.9rem; line-height:1; transition:all var(--transition); }
    .icon-btn:hover { color:var(--gold); background:var(--gold-subtle); }
    .icon-btn.del:hover { color:var(--danger); background:var(--danger-dim); }
    .type-badge { display:inline-block; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold-dim); font-weight:600; }
    .card-sub { font-size:0.75rem; color:var(--text-muted); }
    .card-postcode { font-size:0.75rem; color:var(--gold); font-weight:600; letter-spacing:0.03em; }

    /* ── List View ───────────────────────────────────────────── */
    .list-view { display:flex; flex-direction:column; gap:0.45rem; }
    .list-item {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:0.7rem 1rem;
      display:flex; align-items:center; gap:0.75rem;
      cursor:pointer; transition:all var(--transition);
    }
    .list-item:hover { border-color:var(--border-hover); background:rgba(201,168,76,0.03); }
    .list-badge { min-width:72px; }
    .list-name { flex:1; font-size:0.92rem; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .list-sub { font-size:0.75rem; color:var(--text-muted); white-space:nowrap; }
    .list-postcode { font-size:0.75rem; color:var(--gold); font-weight:600; white-space:nowrap; margin-right:0.5rem; }
    .list-actions { display:flex; gap:0.2rem; flex-shrink:0; }

    /* ── Section separator ───────────────────────────────────── */
    .section-sep { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold-dim); margin:1.5rem 0 0.75rem; padding-bottom:0.4rem; border-bottom:1px solid var(--border); }

    /* ── Number Grid ─────────────────────────────────────────── */
    .number-grid-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; display:flex; flex-direction:column; gap:1.1rem; }
    .number-row { display:flex; flex-direction:column; gap:0.5rem; }
    .number-row-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold-dim); }
    .number-tiles { display:flex; flex-wrap:wrap; gap:0.5rem; }
    .number-tile { min-width:48px; height:48px; padding:0 0.5rem; border-radius:var(--radius); border:1px solid var(--border); font-size:0.85rem; font-weight:600; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all var(--transition); background:var(--surface-2); color:var(--text-muted); }
    .number-tile:hover { border-color:var(--border-hover); color:var(--text); }
    .number-tile.visited { background:rgba(201,168,76,0.15); border-color:var(--gold-dim); color:var(--gold); }
    .number-tile.visited:hover { background:rgba(201,168,76,0.25); }

    /* ── Modal ───────────────────────────────────────────────── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.78); display:flex; align-items:center; justify-content:center; z-index:200; padding:1rem; overflow-y:auto; }
    .modal-box { background:var(--surface); border:1px solid var(--border-hover); border-radius:var(--radius-lg); padding:1.75rem; width:min(500px,100%); position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.6); margin:auto; }
    .modal-close { position:absolute; top:0.85rem; right:0.9rem; background:transparent; border:none; color:var(--text-muted); font-size:1.3rem; line-height:1; padding:0.2rem; transition:color var(--transition); }
    .modal-close:hover { color:var(--gold); }
    .modal-title { font-family:var(--font-serif); font-size:1.2rem; font-weight:normal; color:var(--text); margin-bottom:1.35rem; padding-right:2rem; }
    .modal-field { margin-bottom:1rem; }
    .modal-label { display:block; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--gold-dim); margin-bottom:0.4rem; }
    .modal-input,.modal-textarea { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:0.6rem 0.85rem; color:var(--text); transition:border-color var(--transition); }
    .modal-input:focus,.modal-textarea:focus { outline:none; border-color:var(--gold); }
    .modal-input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter:invert(0.7); cursor:pointer; }
    .modal-textarea { min-height:85px; resize:vertical; }
    .modal-error { font-size:0.78rem; color:#e07070; margin-top:0.3rem; display:none; }
    .modal-error.visible { display:block; }
    .modal-footer { display:flex; justify-content:flex-end; gap:0.65rem; margin-top:1.35rem; }
    .modal-footer.spread { justify-content:space-between; }
    .modal-row { display:grid; grid-template-columns:1fr 1fr; gap:0.65rem; }

    /* ── Outcome Chips ───────────────────────────────────────── */
    .outcome-chips { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:0.65rem; }
    .outcome-chip { padding:0.28rem 0.7rem; border-radius:20px; border:1px solid var(--border); background:var(--surface-2); color:var(--text-muted); font-size:0.78rem; cursor:pointer; transition:all var(--transition); user-select:none; }
    .outcome-chip:hover { border-color:var(--border-hover); color:var(--text); }
    .outcome-chip.selected { background:rgba(201,168,76,0.18); border-color:var(--gold); color:var(--gold); }

    /* ── Address Panel ───────────────────────────────────────── */
    .addr-panel-number { font-family:var(--font-serif); font-size:1.4rem; color:var(--text); }
    .addr-panel-road { font-size:0.78rem; color:var(--text-muted); margin-top:0.1rem; margin-bottom:1rem; }
    .addr-last-visit { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:0.7rem 0.9rem; margin-bottom:0.85rem; }
    .addr-last-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold-dim); margin-bottom:0.25rem; }
    .addr-last-outcome { font-size:0.88rem; color:var(--text); }
    .addr-last-meta { font-size:0.72rem; color:var(--text-muted); margin-top:0.2rem; }
    .history-toggle-btn { background:none; border:none; color:var(--gold-dim); font-size:0.75rem; text-transform:uppercase; letter-spacing:0.07em; cursor:pointer; padding:0; margin-bottom:0.5rem; transition:color var(--transition); }
    .history-toggle-btn:hover { color:var(--gold); }
    .history-section { max-height:0; overflow:hidden; transition:max-height 0.3s ease; }
    .history-section.expanded { max-height:1400px; }
    .history-list { display:flex; flex-direction:column; gap:0.55rem; margin-bottom:0.75rem; }
    .history-item { border-left:2px solid var(--gold-dim); padding-left:0.8rem; }
    .history-item-date { font-size:0.72rem; color:var(--gold); margin-bottom:0.1rem; }
    .history-item-outcome { font-size:0.85rem; color:var(--text); line-height:1.5; }
    .history-item-by { font-size:0.7rem; color:var(--text-muted); margin-top:0.12rem; }
    .history-empty { font-size:0.82rem; color:var(--text-muted); font-style:italic; }

    /* ── Settings ────────────────────────────────────────────── */
    .settings-chip-list { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.45rem; }
    .settings-chip { display:inline-flex; align-items:center; gap:0.3rem; padding:0.22rem 0.6rem; background:var(--surface-2); border:1px solid var(--border); border-radius:20px; font-size:0.76rem; color:var(--text); }
    .settings-chip-remove { background:none; border:none; color:var(--text-muted); font-size:0.88rem; line-height:1; padding:0; cursor:pointer; transition:color var(--transition); }
    .settings-chip-remove:hover { color:var(--danger); }
    .settings-add-row { display:flex; gap:0.45rem; margin-top:0.55rem; }
    .settings-add-row .modal-input { flex:1; }

    /* ── Import Feedback ─────────────────────────────────────── */
    .import-feedback { font-size:0.8rem; padding:0.45rem 0.85rem; border-radius:var(--radius); margin-bottom:0.85rem; border:1px solid transparent; }
    .import-feedback.success { background:rgba(201,168,76,0.1); border-color:var(--gold-dim); color:var(--gold); }
    .import-feedback.error { background:rgba(224,112,112,0.1); border-color:rgba(224,112,112,0.4); color:#e07070; }

    /* ── Empty State ─────────────────────────────────────────── */
    .empty-state { grid-column:1/-1; padding:2.5rem 1.5rem; text-align:center; color:var(--text-muted); font-size:0.88rem; border:1px dashed var(--border); border-radius:var(--radius-lg); }
    .empty-state-hint { margin-top:0.35rem; font-size:0.78rem; color:var(--gold-dim); }
    .confirm-msg { font-size:0.92rem; color:var(--text); margin-bottom:1.35rem; line-height:1.6; }

    /* ── Utility ─────────────────────────────────────────────── */
    .hidden { display:none !important; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width:560px) {
      main { padding:1.25rem 0.85rem 3rem; }
      .app-header { padding:0 0.85rem; gap:0.5rem; }
      .header-search { width:120px; }
      .app-title { font-size:1rem; }
      .card-grid { grid-template-columns:1fr; }
      .modal-box { padding:1.35rem 1.1rem; }
      .modal-row { grid-template-columns:1fr; }
      .number-tile { min-width:44px; height:44px; font-size:0.78rem; }
      .view-header { flex-direction:column; align-items:flex-start; }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1 class="app-title">Road Visits</h1>
    <div class="header-divider"></div>
    <nav id="breadcrumb" class="breadcrumb" aria-label="Navigation"></nav>
    <input type="search" id="global-search" class="header-search" placeholder="Search...">
    <div class="view-toggle-group" id="view-toggle-group">
      <button id="btn-view-grid" class="vtbtn active" title="Grid view">⊞</button>
      <button id="btn-view-list" class="vtbtn" title="List view">≡</button>
    </div>
    <button id="btn-settings" class="settings-btn" title="Settings">&#9881;</button>
  </header>

  <main>
    <!-- VIEW: Place Hierarchy -->
    <section id="view-places">
      <div id="places-view-header" class="view-header"></div>
      <div id="places-container"></div>
    </section>

    <!-- VIEW: Roads in a Postcode -->
    <section id="view-roads" class="hidden">
      <div id="roads-view-header" class="view-header"></div>
      <div id="import-feedback" class="import-feedback hidden"></div>
      <input type="file" id="csv-file-input" accept=".csv" class="hidden">
      <div id="roads-container"></div>
    </section>

    <!-- VIEW: Address Number Grid -->
    <section id="view-addresses" class="hidden">
      <div id="addresses-view-header" class="view-header"></div>
      <div id="number-grid-container"></div>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-box" id="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    /* ── Storage Keys ─────────────────────────────────────── */
    const KEY_ROADS     = 'rtv_roads';
    const KEY_ADDRESSES = 'rtv_addresses';
    const KEY_VISITS    = 'rtv_visits';
    const KEY_OUTCOMES  = 'rtv_outcomes';
    const KEY_SETTINGS  = 'rtv_settings';
    const KEY_PLACES    = 'rtv_places';

    const DEFAULT_OUTCOMES = ['No Answer','Left Leaflet','Interested','Not Interested','Called Back','Moved Away','Revisit Needed','Declined'];

    /* ── Constants ────────────────────────────────────────── */
    const CHILD_TYPE  = { root:'country', country:'city', city:'town', town:'area', area:'postcode' };
    const TYPE_LABEL  = { country:'Country', city:'City', town:'Town', area:'Area', postcode:'Postcode' };
    const TYPE_PLURAL = { country:'Countries', city:'Cities', town:'Towns', area:'Areas', postcode:'Postcodes' };

    /* ── Storage Layer ────────────────────────────────────── */
    function loadRoads()      { return JSON.parse(localStorage.getItem(KEY_ROADS)     || '[]'); }
    function saveRoads(d)     { localStorage.setItem(KEY_ROADS,     JSON.stringify(d)); }
    function loadAddresses()  { return JSON.parse(localStorage.getItem(KEY_ADDRESSES) || '[]'); }
    function saveAddresses(d) { localStorage.setItem(KEY_ADDRESSES, JSON.stringify(d)); }
    function loadVisits()     { return JSON.parse(localStorage.getItem(KEY_VISITS)    || '[]'); }
    function saveVisits(d)    { localStorage.setItem(KEY_VISITS,    JSON.stringify(d)); }
    function loadOutcomes()   { const s = localStorage.getItem(KEY_OUTCOMES); return s ? JSON.parse(s) : DEFAULT_OUTCOMES.slice(); }
    function saveOutcomes(d)  { localStorage.setItem(KEY_OUTCOMES, JSON.stringify(d)); }
    function loadSettings()   { return JSON.parse(localStorage.getItem(KEY_SETTINGS) || '{"currentUser":""}'); }
    function saveSettings(d)  { localStorage.setItem(KEY_SETTINGS, JSON.stringify(d)); }
    function loadPlaces()     { return JSON.parse(localStorage.getItem(KEY_PLACES)    || '[]'); }
    function savePlaces(d)    { localStorage.setItem(KEY_PLACES,    JSON.stringify(d)); }

    /* ── UID ──────────────────────────────────────────────── */
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

    /* ── State ────────────────────────────────────────────── */
    const state = {
      view:             'places',   // 'places' | 'roads' | 'addresses'
      placeStack:       [],         // [{id, type, name}] — breadcrumb trail
      currentPlaceId:   null,       // place whose children we show (null = root)
      currentPostcodeId:null,       // postcode id for roads view ('__ungrouped__' for ungrouped)
      currentRoadId:    null,
      viewMode:         'grid',     // 'grid' | 'list'
      search:           '',
    };

    /* ── Navigation ───────────────────────────────────────── */
    function clearSearch() {
      state.search = '';
      document.getElementById('global-search').value = '';
    }

    function navigateToRoot() {
      state.placeStack = []; state.currentPlaceId = null;
      state.view = 'places'; clearSearch(); render();
    }

    function navigateIntoPlace(place) {
      state.placeStack.push({ id:place.id, type:place.type, name:place.name });
      clearSearch();
      if (place.type === 'postcode') {
        state.view = 'roads'; state.currentPostcodeId = place.id;
      } else {
        state.view = 'places'; state.currentPlaceId = place.id;
      }
      render();
    }

    function navigateToUngrouped() {
      state.placeStack.push({ id:'__ungrouped__', type:'ungrouped', name:'Ungrouped Roads' });
      state.currentPostcodeId = '__ungrouped__';
      state.view = 'roads'; clearSearch(); render();
    }

    function navigateIntoRoad(road) {
      state.placeStack.push({ id:road.id, type:'road', name:road.name });
      state.currentRoadId = road.id;
      state.view = 'addresses'; clearSearch(); render();
    }

    function navigateBackTo(idx) {
      // idx = -1 means root
      if (idx < 0) { navigateToRoot(); return; }
      const target = state.placeStack[idx];
      state.placeStack = state.placeStack.slice(0, idx + 1);
      clearSearch();
      if (target.type === 'road') {
        state.view = 'addresses'; state.currentRoadId = target.id;
      } else if (target.type === 'postcode') {
        state.view = 'roads'; state.currentPostcodeId = target.id;
      } else if (target.type === 'ungrouped') {
        state.view = 'roads'; state.currentPostcodeId = '__ungrouped__';
      } else {
        state.view = 'places'; state.currentPlaceId = target.id;
      }
      render();
    }

    /* ── Breadcrumb ───────────────────────────────────────── */
    function updateBreadcrumb() {
      const bc = document.getElementById('breadcrumb');
      bc.innerHTML = '';

      const homeEl = document.createElement('span');
      homeEl.className = 'bc-item' + (state.placeStack.length ? ' link' : '');
      homeEl.textContent = 'Home';
      if (state.placeStack.length) homeEl.addEventListener('click', () => navigateBackTo(-1));
      bc.appendChild(homeEl);

      state.placeStack.forEach((item, i) => {
        const sep = document.createElement('span');
        sep.className = 'bc-sep'; sep.textContent = '/';
        bc.appendChild(sep);
        const el = document.createElement('span');
        const isLast = i === state.placeStack.length - 1;
        el.className = 'bc-item' + (isLast ? '' : ' link');
        el.textContent = item.name;
        if (!isLast) el.addEventListener('click', () => navigateBackTo(i));
        bc.appendChild(el);
      });

      // Show/hide search and toggle for addresses view
      const searchEl = document.getElementById('global-search');
      const toggleEl = document.getElementById('view-toggle-group');
      if (state.view === 'addresses') {
        searchEl.classList.add('hidden');
        toggleEl.classList.add('hidden');
      } else {
        searchEl.classList.remove('hidden');
        toggleEl.classList.remove('hidden');
      }
    }

    /* ── Helpers ──────────────────────────────────────────── */
    function formatDate(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}) + ' at ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
      } catch(e) { return ''; }
    }
    function toDatetimeLocal(date) {
      const d = date || new Date();
      const p = n => String(n).padStart(2,'0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function getLastVisit(addressId) {
      const v = loadVisits().filter(v => v.addressId === addressId);
      return v.length ? v.sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp))[0] : null;
    }
    function parseAddressNumber(addr) {
      const m = String(addr).match(/\d+/); return m ? parseInt(m[0],10) : null;
    }
    function getPlaceChildCount(placeId) {
      // count places children + roads if postcode
      const p = loadPlaces().find(x => x.id === placeId);
      if (!p) return 0;
      if (p.type === 'postcode') return loadRoads().filter(r => r.postcodeId === placeId).length;
      return loadPlaces().filter(x => x.parentId === placeId).length;
    }
    function childLabel(placeType) {
      const ct = CHILD_TYPE[placeType || 'root'];
      return ct ? TYPE_PLURAL[ct] : 'Roads';
    }
    function getAllDescendantPlaceIds(placeId) {
      const all = loadPlaces();
      const result = [], queue = [placeId];
      while (queue.length) {
        const pid = queue.shift();
        all.filter(p => p.parentId === pid).forEach(c => { result.push(c.id); queue.push(c.id); });
      }
      return result;
    }

    /* ── Delete Place (cascade) ───────────────────────────── */
    function deletePlace(placeId) {
      const place = loadPlaces().find(p => p.id === placeId);
      openConfirm({
        message: `Delete "${place ? place.name : 'this item'}"? All nested items, roads, addresses, and visit history inside it will be permanently removed.`,
        confirmLabel: 'Delete',
        onConfirm() {
          const descIds = getAllDescendantPlaceIds(placeId);
          const allPlaceIds = new Set([placeId, ...descIds]);
          const affRoads = loadRoads().filter(r => allPlaceIds.has(r.postcodeId));
          const affRoadIds = new Set(affRoads.map(r => r.id));
          const affAddrs = loadAddresses().filter(a => affRoadIds.has(a.roadId));
          const affAddrIds = new Set(affAddrs.map(a => a.id));
          savePlaces(loadPlaces().filter(p => !allPlaceIds.has(p.id)));
          saveRoads(loadRoads().filter(r => !affRoadIds.has(r.id)));
          saveAddresses(loadAddresses().filter(a => !affAddrIds.has(a.roadId)));
          saveVisits(loadVisits().filter(v => !affAddrIds.has(v.addressId)));
          // If we were inside this place, go up
          if (state.placeStack.some(s => s.id === placeId)) navigateToRoot();
          else render();
        }
      });
    }

    /* ── Delete Road ──────────────────────────────────────── */
    function deleteRoad(roadId) {
      const road = loadRoads().find(r => r.id === roadId);
      openConfirm({
        message: `Delete "${road ? road.name : 'this road'}"? All addresses and visit history will also be removed.`,
        confirmLabel: 'Delete Road',
        onConfirm() {
          const addrs = loadAddresses().filter(a => a.roadId === roadId);
          const addrIds = new Set(addrs.map(a => a.id));
          saveRoads(loadRoads().filter(r => r.id !== roadId));
          saveAddresses(loadAddresses().filter(a => a.roadId !== roadId));
          saveVisits(loadVisits().filter(v => !addrIds.has(v.addressId)));
          if (state.currentRoadId === roadId) navigateBackTo(state.placeStack.length - 2);
          else render();
        }
      });
    }

    /* ── Render Places ────────────────────────────────────── */
    function renderPlaces() {
      // Determine current level
      const curPlace = state.currentPlaceId ? loadPlaces().find(p => p.id === state.currentPlaceId) : null;
      const curType  = curPlace ? curPlace.type : 'root';
      const childType = CHILD_TYPE[curType];

      // Build header
      const hdr = document.getElementById('places-view-header');
      hdr.innerHTML = '';
      const titleDiv = document.createElement('div');
      const titleEl = document.createElement('h2');
      titleEl.className = 'view-title';
      titleEl.textContent = curPlace
        ? (TYPE_PLURAL[childType] || 'Roads') + ' in ' + curPlace.name
        : 'Countries';
      titleDiv.appendChild(titleEl);
      hdr.appendChild(titleDiv);

      if (childType) {
        const addBtn = document.createElement('button');
        addBtn.className = 'btn btn-primary';
        addBtn.textContent = '+ Add ' + TYPE_LABEL[childType];
        addBtn.addEventListener('click', () => openNewPlaceModal(state.currentPlaceId, childType));
        hdr.appendChild(addBtn);
      }

      // Get children
      let items = loadPlaces().filter(p => p.parentId === state.currentPlaceId);
      if (state.search) items = items.filter(p => p.name.toLowerCase().includes(state.search));
      items.sort((a,b) => a.name.localeCompare(b.name));

      const container = document.getElementById('places-container');
      container.innerHTML = '';

      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        if (state.search) {
          empty.textContent = 'No results for "' + state.search + '".';
        } else {
          empty.innerHTML = `<div>No ${childType ? TYPE_PLURAL[childType] : 'items'} yet.</div><div class="empty-state-hint">Click "+ Add ${childType ? TYPE_LABEL[childType] : 'Item'}" to get started.</div>`;
        }
        container.appendChild(empty);
      } else {
        const grid = document.createElement('div');
        grid.className = state.viewMode === 'grid' ? 'card-grid' : 'list-view';
        items.forEach(p => grid.appendChild(state.viewMode === 'grid' ? createPlaceCard(p) : createPlaceListItem(p)));
        container.appendChild(grid);
      }

      // Ungrouped roads at root only
      if (!state.currentPlaceId && !state.search) {
        const ungrouped = loadRoads().filter(r => !r.postcodeId);
        if (ungrouped.length) {
          const sep = document.createElement('div');
          sep.className = 'section-sep'; sep.textContent = 'Ungrouped Roads';
          container.appendChild(sep);
          const ugGrid = document.createElement('div');
          ugGrid.className = state.viewMode === 'grid' ? 'card-grid' : 'list-view';

            ? createUngroupedCard(ungrouped.length)

    /* ── Render Roads ─────────────────────────────────────── */
    function renderRoads() {
      const postcodeId = state.currentPostcodeId;
      const isUngrouped = postcodeId === '__ungrouped__';
      const postcode = isUngrouped ? null : loadPlaces().find(p => p.id === postcodeId);

      // Header
      const hdr = document.getElementById('roads-view-header');
      hdr.innerHTML = '';
      const titleEl = document.createElement('h2');
      titleEl.className = 'view-title';
      titleEl.textContent = isUngrouped ? 'Ungrouped Roads' : 'Roads' + (postcode ? ' in ' + postcode.name : '');
      const acts = document.createElement('div');
      acts.className = 'view-actions';
      const dlBtn = document.createElement('button');
      dlBtn.className = 'btn btn-ghost btn-sm'; dlBtn.textContent = 'Download Template';
      dlBtn.addEventListener('click', downloadTemplate);
      const impBtn = document.createElement('button');
      impBtn.className = 'btn btn-ghost btn-sm'; impBtn.textContent = 'Import CSV';
      impBtn.addEventListener('click', () => { document.getElementById('csv-file-input').value = ''; document.getElementById('csv-file-input').click(); });
      const addBtn = document.createElement('button');
      addBtn.className = 'btn btn-primary'; addBtn.textContent = '+ Add Road';
      addBtn.addEventListener('click', () => openNewRoadModal(isUngrouped ? null : postcodeId));
      acts.appendChild(dlBtn); acts.appendChild(impBtn); acts.appendChild(addBtn);
      hdr.appendChild(titleEl); hdr.appendChild(acts);

      // Get roads
      let roads = isUngrouped
        ? loadRoads().filter(r => !r.postcodeId)
        : loadRoads().filter(r => r.postcodeId === postcodeId);

      if (state.search) {
        const q = state.search;
        roads = roads.filter(r =>
          r.name.toLowerCase().includes(q) ||
          (r.postcode || '').toLowerCase().includes(q)
        );
      }
      roads.sort((a,b) => a.name.localeCompare(b.name));

      const container = document.getElementById('roads-container');
      container.innerHTML = '';

      if (!roads.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        if (state.search) {
          empty.textContent = 'No roads match "' + state.search + '".';
        } else {
          empty.innerHTML = '<div>No roads yet.</div><div class="empty-state-hint">Click "+ Add Road" to add one.</div>';
        }
        container.appendChild(empty);
      } else {
        const grid = document.createElement('div');
        grid.className = state.viewMode === 'grid' ? 'card-grid' : 'list-view';
        roads.forEach(r => grid.appendChild(state.viewMode === 'grid' ? createRoadCard(r) : createRoadListItem(r)));
        container.appendChild(grid);
      }
    }

    /* ── Render Addresses ─────────────────────────────────── */
    function renderAddresses() {
      const road = loadRoads().find(r => r.id === state.currentRoadId);

      // Header
      const hdr = document.getElementById('addresses-view-header');
      hdr.innerHTML = '';
      const titleDiv = document.createElement('div');
      const titleEl = document.createElement('h2');
      titleEl.className = 'view-title'; titleEl.textContent = road ? road.name : '';
      if (road && road.postcode) {
        const sub = document.createElement('span');
        sub.className = 'view-title-sub'; sub.textContent = road.postcode;
        titleEl.appendChild(sub);
      }
      titleDiv.appendChild(titleEl);
      const addBtn = document.createElement('button');
      addBtn.className = 'btn btn-primary'; addBtn.textContent = '+ Add Address';
      addBtn.addEventListener('click', () => openAddAddressModal(state.currentRoadId));
      hdr.appendChild(titleDiv); hdr.appendChild(addBtn);

      // Number grid
      const container = document.getElementById('number-grid-container');
      container.innerHTML = '';
      const addresses = loadAddresses().filter(a => a.roadId === state.currentRoadId);

      if (!addresses.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<div>No addresses yet.</div><div class="empty-state-hint">Click "+ Add Address" to add house numbers.</div>';
        container.appendChild(empty);
        return;
      }

      const even = [], odd = [], other = [];
      addresses.forEach(a => {
        const n = parseAddressNumber(a.address);
        if (n === null) other.push(a);
        else if (n % 2 === 0) even.push(a);
        else odd.push(a);
      });
      const sortAddr = arr => arr.sort((a,b) => (parseAddressNumber(a.address) ?? 9999) - (parseAddressNumber(b.address) ?? 9999) || a.address.localeCompare(b.address));
      sortAddr(even); sortAddr(odd); sortAddr(other);

      const wrap = document.createElement('div');
      wrap.className = 'number-grid-wrap';
      [{ label:'Even', items:even }, { label:'Odd', items:odd }, { label:'Other', items:other }]
        .filter(s => s.items.length)
        .forEach(sec => {
          const row = document.createElement('div');
          row.className = 'number-row';
          const lbl = document.createElement('div');
          lbl.className = 'number-row-label'; lbl.textContent = sec.label;
          const tiles = document.createElement('div');
          tiles.className = 'number-tiles';
          sec.items.forEach(addr => {
            const lv = getLastVisit(addr.id);
            const tile = document.createElement('button');
            tile.className = 'number-tile' + (lv ? ' visited' : '');
            tile.textContent = addr.address;
            tile.title = lv ? 'Last: ' + lv.outcome : 'No visits yet';
            tile.addEventListener('click', () => openAddressPanel(addr.id));
            tiles.appendChild(tile);
          });
          row.appendChild(lbl); row.appendChild(tiles);
          wrap.appendChild(row);
        });
      container.appendChild(wrap);
    }

    /* ── Master Render ────────────────────────────────────── */
    function render() {
      updateBreadcrumb();
      document.getElementById('view-places').classList.toggle('hidden', state.view !== 'places');
      document.getElementById('view-roads').classList.toggle('hidden', state.view !== 'roads');
      document.getElementById('view-addresses').classList.toggle('hidden', state.view !== 'addresses');

      if (state.view === 'places')    renderPlaces();
      else if (state.view === 'roads') renderRoads();
      else                             renderAddresses();
    }

    /* ── Modal System ─────────────────────────────────────── */
    function openModal(buildFn) {
      const c = document.getElementById('modal-content');
      c.innerHTML = '';
      buildFn(c);
      document.getElementById('modal-overlay').classList.remove('hidden');
      setTimeout(() => { const f = c.querySelector('input:not([type=hidden]),textarea,select'); if (f) f.focus(); }, 50);
    }
    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
      document.getElementById('modal-content').innerHTML = '';
    }

    /* ── Confirm Modal ────────────────────────────────────── */
    function openConfirm({ message, confirmLabel, onConfirm }) {
      openModal(c => {
        const title = el('h3','modal-title','Confirm');
        const msg = el('p','confirm-msg', message);
        const footer = document.createElement('div'); footer.className = 'modal-footer';
        const cancelBtn = btn('btn-ghost','Cancel', closeModal);
        const confirmBtn = btn('btn-danger', confirmLabel || 'Delete', () => { closeModal(); onConfirm(); });
        footer.appendChild(cancelBtn); footer.appendChild(confirmBtn);
        c.appendChild(title); c.appendChild(msg); c.appendChild(footer);
      });
    }

    /* ── DOM helpers ──────────────────────────────────────── */
    function el(tag, cls, text) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text !== undefined) e.textContent = text;
      return e;
    }
    function btn(cls, text, onclick) {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'btn ' + cls; b.textContent = text;
      b.addEventListener('click', onclick);
      return b;
    }
    function field(labelText, inputEl, errorText) {
      const wrap = el('div','modal-field');
      const lbl = el('label','modal-label', labelText);
      lbl.setAttribute('for', inputEl.id || '');
      wrap.appendChild(lbl); wrap.appendChild(inputEl);
      if (errorText) {
        const err = el('div','modal-error', errorText);
        if (inputEl.id) err.id = 'err-' + inputEl.id;
        wrap.appendChild(err);
      }
      return wrap;
    }
    function textInput(id, placeholder, value) {
      const i = document.createElement('input');
      i.className = 'modal-input'; i.type = 'text'; i.id = id;
      if (placeholder) i.placeholder = placeholder;
      if (value) i.value = value;
      return i;
    }

    /* ── New Place Modal ──────────────────────────────────── */
    function openNewPlaceModal(parentId, childType) {
      openModal(c => {
        const titleEl = el('h3','modal-title','New ' + TYPE_LABEL[childType]);
        const nameIn = textInput('np-name', 'e.g. ' + (childType === 'country' ? 'United Kingdom' : childType === 'city' ? 'London' : childType === 'town' ? 'Camden' : childType === 'area' ? 'Kentish Town' : 'NW5 1AA'), '');
        const nameField = field(TYPE_LABEL[childType] + ' Name', nameIn, 'Name is required.');
        const footer = document.createElement('div'); footer.className = 'modal-footer';
        footer.appendChild(btn('btn-ghost','Cancel',closeModal));
        footer.appendChild(btn('btn-primary','Create', () => {
          const name = nameIn.value.trim();
          if (!name) { document.getElementById('err-np-name').classList.add('visible'); return; }
          const places = loadPlaces();
          places.push({ id:uid(), parentId, type:childType, name });
          savePlaces(places); closeModal(); render();
        }));
        c.appendChild(titleEl); c.appendChild(nameField); c.appendChild(footer);
      });
    }

    /* ── Edit Place Modal ─────────────────────────────────── */
    function openEditPlaceModal(placeId) {
      const place = loadPlaces().find(p => p.id === placeId);
      if (!place) return;
      openModal(c => {
        const titleEl = el('h3','modal-title','Edit ' + TYPE_LABEL[place.type]);
        const nameIn = textInput('ep-name','', place.name);
        const nameField = field('Name', nameIn, 'Name is required.');
        const footer = document.createElement('div'); footer.className = 'modal-footer';
        footer.appendChild(btn('btn-ghost','Cancel',closeModal));
        footer.appendChild(btn('btn-primary','Save', () => {
          const name = nameIn.value.trim();
          if (!name) { document.getElementById('err-ep-name').classList.add('visible'); return; }
          const places = loadPlaces();
          const idx = places.findIndex(p => p.id === placeId);
          if (idx !== -1) { places[idx].name = name; savePlaces(places); }
          // update breadcrumb stack if this place is in it
          state.placeStack.forEach(s => { if (s.id === placeId) s.name = name; });
          closeModal(); render();
        }));
        c.appendChild(titleEl); c.appendChild(nameField); c.appendChild(footer);
      });
    }

    /* ── New Road Modal ───────────────────────────────────── */
    function openNewRoadModal(postcodeId) {
      openModal(c => {
        const titleEl = el('h3','modal-title','New Road');
        const nameIn = textInput('nr-name','e.g. Oak Street','');
        const nameField = field('Road Name', nameIn, 'Road name is required.');
        const footer = document.createElement('div'); footer.className = 'modal-footer';
        const inputs = [nameIn];

        let pcField = null;
        if (!postcodeId) {
          // ungrouped: also show postcode text field
          const pcIn = textInput('nr-postcode','e.g. SW1A 1AA','');
          pcField = field('Postcode (optional)', pcIn, '');
          inputs.push(pcIn);
        }

        footer.appendChild(btn('btn-ghost','Cancel',closeModal));
        footer.appendChild(btn('btn-primary','Create Road', () => {
          const name = nameIn.value.trim();
          if (!name) { document.getElementById('err-nr-name').classList.add('visible'); return; }
          const postcode = pcField ? c.querySelector('#nr-postcode').value.trim() : '';
          const road = { id:uid(), name, postcode, postcodeId: postcodeId || null, createdAt:new Date().toISOString() };
          const roads = loadRoads(); roads.push(road); saveRoads(roads);
          closeModal(); render();
        }));

        c.appendChild(titleEl); c.appendChild(nameField);
        if (pcField) c.appendChild(pcField);
        c.appendChild(footer);
      });
    }

    /* ── Edit Road Modal ──────────────────────────────────── */
    function openEditRoadModal(roadId) {
      const road = loadRoads().find(r => r.id === roadId);
      if (!road) return;
      openModal(c => {
        const titleEl = el('h3','modal-title','Edit Road');
        const nameIn = textInput('er-name','',road.name);
        const nameField = field('Road Name', nameIn, 'Name is required.');
        const pcIn = textInput('er-postcode','e.g. SW1A 1AA', road.postcode || '');
        const pcField = field('Postcode', pcIn, '');
        const footer = document.createElement('div'); footer.className = 'modal-footer';
        footer.appendChild(btn('btn-ghost','Cancel',closeModal));
        footer.appendChild(btn('btn-primary','Save', () => {
          const name = nameIn.value.trim();
          if (!name) { document.getElementById('err-er-name').classList.add('visible'); return; }
          const roads = loadRoads();
          const idx = roads.findIndex(r => r.id === roadId);
          if (idx !== -1) { roads[idx].name = name; roads[idx].postcode = pcIn.value.trim(); saveRoads(roads); }
          state.placeStack.forEach(s => { if (s.id === roadId) s.name = name; });
          closeModal(); render();
        }));
        c.appendChild(titleEl); c.appendChild(nameField); c.appendChild(pcField); c.appendChild(footer);
      });
    }

    /* ── Add Address Modal ────────────────────────────────── */
    function openAddAddressModal(roadId) {
      openModal(c => {
        const titleEl = el('h3','modal-title','Add Address');
        const addrIn = textInput('aa-addr','e.g. 14 or 14B or Flat 3','');
        const addrField = field('House Number / Address', addrIn, 'Address is required.');
        const dupErr = el('div','modal-error','This address already exists on this road.');
        dupErr.id = 'err-aa-dup';
        addrField.appendChild(dupErr);
        const footer = document.createElement('div'); footer.className = 'modal-footer';
        footer.appendChild(btn('btn-ghost','Cancel',closeModal));
        footer.appendChild(btn('btn-primary','Add', () => {
          const address = addrIn.value.trim();
          if (!address) { document.getElementById('err-aa-addr').classList.add('visible'); return; }
          const addresses = loadAddresses();
          if (addresses.some(a => a.roadId === roadId && a.address.toLowerCase() === address.toLowerCase())) {
            dupErr.classList.add('visible'); return;
          }
          addresses.push({ id:uid(), roadId, address });
          saveAddresses(addresses); closeModal(); render();
        }));
        c.appendChild(titleEl); c.appendChild(addrField); c.appendChild(footer);
      });
    }

    /* ── Log Visit Modal ──────────────────────────────────── */
    function openLogVisitModal(addressId) {
      const outcomes  = loadOutcomes();
      const settings  = loadSettings();
      const addr      = loadAddresses().find(a => a.id === addressId);
      let selectedChip = '';

      openModal(c => {
        c.appendChild(el('h3','modal-title','Log Visit — ' + (addr ? addr.address : '')));

        // Outcome chips
        c.appendChild(el('div','modal-label','Outcome'));
        const chipsWrap = el('div','outcome-chips');
        outcomes.forEach(opt => {
          const chip = el('button','outcome-chip', opt);
          chip.type = 'button';
          chip.addEventListener('click', () => {
            selectedChip = selectedChip === opt ? '' : opt;
            chipsWrap.querySelectorAll('.outcome-chip').forEach(ch => ch.classList.toggle('selected', ch.textContent === selectedChip));
          });
          chipsWrap.appendChild(chip);
        });
        c.appendChild(chipsWrap);

        // Notes
        c.appendChild(el('div','modal-label','Notes (optional)'));
        const notesEl = document.createElement('textarea');
        notesEl.className = 'modal-textarea'; notesEl.style.minHeight = '70px';
        notesEl.placeholder = 'Any additional details...';
        c.appendChild(notesEl);

        const outcomeErr = el('div','modal-error','Please select an outcome or add notes.');
        c.appendChild(outcomeErr);

        // Date/time + Entered by
        const row = el('div','modal-row'); row.style.marginTop = '0.75rem';
        const dtWrap = el('div','modal-field'); dtWrap.style.marginBottom = '0';
        dtWrap.appendChild(el('label','modal-label','Date & Time'));
        const dtIn = document.createElement('input');
        dtIn.className = 'modal-input'; dtIn.type = 'datetime-local'; dtIn.value = toDatetimeLocal(new Date());
        dtWrap.appendChild(dtIn);

        const byWrap = el('div','modal-field'); byWrap.style.marginBottom = '0';
        byWrap.appendChild(el('label','modal-label','Entered By'));
        const byIn = textInput('','Your name', settings.currentUser || '');
        byWrap.appendChild(byIn);

        row.appendChild(dtWrap); row.appendChild(byWrap);
        c.appendChild(row);

        // Footer
        const footer = document.createElement('div'); footer.className = 'modal-footer';
        footer.appendChild(btn('btn-ghost','Cancel',closeModal));
        footer.appendChild(btn('btn-primary','Save Visit', () => {
          const notesVal = notesEl.value.trim();
          if (!selectedChip && !notesVal) { outcomeErr.classList.add('visible'); return; }
          outcomeErr.classList.remove('visible');
          const outcome = selectedChip ? (notesVal ? selectedChip + ' — ' + notesVal : selectedChip) : notesVal;
          const timestamp = dtIn.value ? new Date(dtIn.value).toISOString() : new Date().toISOString();
          const enteredBy = byIn.value.trim();
          if (enteredBy) { const s = loadSettings(); s.currentUser = enteredBy; saveSettings(s); }
          const visits = loadVisits();
          visits.push({ id:uid(), addressId, outcome, timestamp, enteredBy });
          saveVisits(visits); closeModal(); render();
        }));
        c.appendChild(footer);
      });
    }

    /* ── Address Panel Modal ──────────────────────────────── */
    function openAddressPanel(addressId) {
      const addr = loadAddresses().find(a => a.id === addressId);
      const road = addr ? loadRoads().find(r => r.id === addr.roadId) : null;
      const lv   = getLastVisit(addressId);
      let histExpanded = false;

      openModal(c => {
        c.appendChild(el('div','addr-panel-number', addr ? addr.address : ''));
        c.appendChild(el('div','addr-panel-road', road ? road.name + (road.postcode ? ' · ' + road.postcode : '') : ''));

        // Last visit
        const lvBox = el('div','addr-last-visit');
        lvBox.appendChild(el('div','addr-last-label','Last Visit'));
        if (lv) {
          lvBox.appendChild(el('div','addr-last-outcome', lv.outcome));
          lvBox.appendChild(el('div','addr-last-meta', formatDate(lv.timestamp) + (lv.enteredBy ? ' · by ' + lv.enteredBy : '')));
        } else {
          const none = el('div','','No visits yet.');
          none.style.cssText = 'font-size:0.83rem;color:var(--text-muted);font-style:italic';
          lvBox.appendChild(none);
        }
        c.appendChild(lvBox);

        // History toggle
        const histBtn = el('button','history-toggle-btn','+ Show History');
        const histSec = el('div','history-section');
        histSec.appendChild(buildHistoryList(addressId));
        histBtn.addEventListener('click', () => {
          histExpanded = !histExpanded;
          histSec.classList.toggle('expanded', histExpanded);
          histBtn.textContent = histExpanded ? '– Hide History' : '+ Show History';
        });
        c.appendChild(histBtn); c.appendChild(histSec);

        // Footer
        const footer = document.createElement('div');
        footer.className = 'modal-footer spread';

        const delBtn = btn('btn-danger btn-sm','Delete Address', () => {
          closeModal();
          openConfirm({
            message: `Delete address "${addr ? addr.address : ''}"? All visit history will also be removed.`,
            confirmLabel: 'Delete Address',
            onConfirm() {
              saveAddresses(loadAddresses().filter(a => a.id !== addressId));
              saveVisits(loadVisits().filter(v => v.addressId !== addressId));
              render();
            }
          });
        });

        const rightBtns = document.createElement('div');
        rightBtns.style.cssText = 'display:flex;gap:0.65rem';
        rightBtns.appendChild(btn('btn-ghost','Close',closeModal));
        rightBtns.appendChild(btn('btn-primary','Log Visit', () => openLogVisitModal(addressId)));

        footer.appendChild(delBtn); footer.appendChild(rightBtns);
        c.appendChild(footer);
      });
    }

    function buildHistoryList(addressId) {
      const visits = loadVisits().filter(v => v.addressId === addressId).sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp));
      const ul = el('ul','history-list');
      ul.style.marginBottom = '0.65rem';
      if (!visits.length) { ul.appendChild(el('li','history-empty','No visits logged yet.')); return ul; }
      visits.forEach(v => {
        const li = el('li','history-item');
        li.appendChild(el('div','history-item-date', formatDate(v.timestamp)));
        li.appendChild(el('div','history-item-outcome', v.outcome));
        if (v.enteredBy) li.appendChild(el('div','history-item-by','By: ' + v.enteredBy));
        ul.appendChild(li);
      });
      return ul;
    }

    /* ── Settings Modal ───────────────────────────────────── */
    function openSettingsModal() {
      openModal(c => {
        c.appendChild(el('h3','modal-title','Settings'));

        const nameIn = textInput('s-name','Enter your name', loadSettings().currentUser || '');
        c.appendChild(field('Your Name', nameIn, ''));

        c.appendChild(el('div','modal-label','Standard Outcome Options'));
        const chipList = el('div','settings-chip-list');

        function rebuildChips() {
          chipList.innerHTML = '';
          loadOutcomes().forEach((opt,i) => {
            const chip = el('span','settings-chip', opt);
            const rm = el('button','settings-chip-remove','×');
            rm.addEventListener('click', () => { const o = loadOutcomes(); o.splice(i,1); saveOutcomes(o); rebuildChips(); });
            chip.appendChild(rm); chipList.appendChild(chip);
          });
        }
        rebuildChips();
        c.appendChild(chipList);

        const addRow = el('div','settings-add-row');
        const addIn = textInput('','New outcome option','');
        addIn.className = 'modal-input';
        const addBtn2 = btn('btn-ghost btn-sm','Add', () => {
          const v = addIn.value.trim();
          if (!v) return;
          const o = loadOutcomes();
          if (!o.includes(v)) { o.push(v); saveOutcomes(o); }
          addIn.value = ''; rebuildChips();
        });
        addIn.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addBtn2.click(); } });
        addRow.appendChild(addIn); addRow.appendChild(addBtn2);
        c.appendChild(addRow);

        const footer = document.createElement('div'); footer.className = 'modal-footer';
        footer.appendChild(btn('btn-primary','Save', () => {
          const s = loadSettings(); s.currentUser = nameIn.value.trim(); saveSettings(s); closeModal();
        }));
        c.appendChild(footer);
      });
    }

    /* ── CSV Import / Export ──────────────────────────────── */
    function downloadTemplate() {
      const csv = ['Road Name,Postcode,Address','Oak Street,SW1A 1AA,1','Oak Street,SW1A 1AA,2','Oak Street,SW1A 1AA,3','Elm Avenue,EC1A 1BB,14','Elm Avenue,EC1A 1BB,16'].join('\r\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
      a.download = 'road-visits-template.csv'; a.click();
    }

    function showImportFeedback(msg, type) {
      const el2 = document.getElementById('import-feedback');
      el2.textContent = msg; el2.className = 'import-feedback ' + type;
      el2.classList.remove('hidden');
      setTimeout(() => el2.classList.add('hidden'), 5000);
    }

    function importCSV(file) {
      const reader = new FileReader();
      reader.onload = e => {
        const lines = e.target.result.split(/\r?\n/).map(l => l.trim()).filter(l => l);
        if (!lines.length) { showImportFeedback('File is empty.','error'); return; }
        const first = lines[0].toLowerCase();
        const hasHeader = first.startsWith('road') || first.startsWith('name');
        const dataLines = hasHeader ? lines.slice(1) : lines;
        const headerCols = hasHeader ? lines[0].split(',').map(c => c.trim().toLowerCase()) : [];
        const hasPostcode = headerCols.length >= 3 && headerCols[1].includes('post');

        const roads = loadRoads(), addresses = loadAddresses();
        let newRoads = 0, newAddresses = 0;

        dataLines.forEach(line => {
          const parts = line.split(',');
          const roadName = (parts[0]||'').trim();
          let postcode = '', addrValue = '';
          if (hasPostcode) { postcode = (parts[1]||'').trim(); addrValue = parts.slice(2).join(',').trim(); }
          else { addrValue = parts.slice(1).join(',').trim(); }
          if (!roadName || !addrValue) return;

          let road = roads.find(r => r.name.toLowerCase() === roadName.toLowerCase());
          if (!road) { road = {id:uid(),name:roadName,postcode,postcodeId:null,createdAt:new Date().toISOString()}; roads.push(road); newRoads++; }
          if (!addresses.some(a => a.roadId === road.id && a.address.toLowerCase() === addrValue.toLowerCase())) {
            addresses.push({id:uid(),roadId:road.id,address:addrValue}); newAddresses++;
          }
        });

        saveRoads(roads); saveAddresses(addresses); render();
        showImportFeedback(`Imported ${newRoads} road${newRoads!==1?'s':''} and ${newAddresses} address${newAddresses!==1?'es':''}.`,'success');
      };
      reader.onerror = () => showImportFeedback('Could not read file.','error');
      reader.readAsText(file);
    }

    /* ── Event Binding ────────────────────────────────────── */
    function bindStaticEvents() {
      document.getElementById('btn-settings').addEventListener('click', openSettingsModal);

      document.getElementById('global-search').addEventListener('input', e => {
        state.search = e.target.value.trim().toLowerCase();
        if (state.view === 'places') renderPlaces();
        else if (state.view === 'roads') renderRoads();
      });

      document.getElementById('btn-view-grid').addEventListener('click', () => {
        state.viewMode = 'grid';
        document.getElementById('btn-view-grid').classList.add('active');
        document.getElementById('btn-view-list').classList.remove('active');
        render();
      });
      document.getElementById('btn-view-list').addEventListener('click', () => {
        state.viewMode = 'list';
        document.getElementById('btn-view-list').classList.add('active');
        document.getElementById('btn-view-grid').classList.remove('active');
        render();
      });

      document.getElementById('csv-file-input').addEventListener('change', function () {
        if (this.files && this.files[0]) importCSV(this.files[0]);
      });

      document.getElementById('modal-close').addEventListener('click', closeModal);
      document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    }

    /* ── Init ─────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => { bindStaticEvents(); render(); });

  }());
  </script>
</body>
</html>
