<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://nominatim.openstreetmap.org; img-src 'self' data: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; font-src 'self'; frame-ancestors 'none';">
  <title>Road Visit Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H"
        crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH"
          crossorigin="anonymous"></script>
  <style>
    /* ── Custom Properties ─────────────────────────────────── */
    :root {
      --bg:           #0a0a0a;
      --surface:      #1a1a1a;
      --surface-2:    #222222;
      --gold:         #C9A84C;
      --gold-dim:     #8a6f2e;
      --gold-subtle:  rgba(201,168,76,0.08);
      --text:         #e8e4d9;
      --text-muted:   #7a7060;
      --border:       rgba(201,168,76,0.22);
      --border-hover: rgba(201,168,76,0.60);
      --danger:       #c0392b;
      --danger-dim:   rgba(192,57,43,0.15);
      --radius:       7px;
      --radius-lg:    10px;
      --transition:   0.2s ease;
      --font-serif:   Georgia,'Times New Roman',serif;
      --font-body:    system-ui,-apple-system,sans-serif;
      --header-h:     60px;
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:15px; line-height:1.6; min-height:100vh; }
    button { cursor:pointer; font-family:inherit; font-size:inherit; }
    input,textarea,select { font-family:inherit; font-size:inherit; color:var(--text); }
    ul { list-style:none; }

    /* ── Header ────────────────────────────────────────────── */
    .app-header {
      position:sticky; top:0; z-index:100;
      height:var(--header-h);
      background:rgba(10,10,10,0.93);
      backdrop-filter:blur(8px);
      border-bottom:1px solid var(--gold-dim);
      display:flex; align-items:center;
      padding:0 1.25rem; gap:0.75rem;
    }
    .app-title { font-family:var(--font-serif); font-size:1.15rem; font-weight:normal; color:var(--gold); letter-spacing:0.05em; white-space:nowrap; }
    .header-divider { width:1px; height:1.4rem; background:var(--gold-dim); opacity:0.5; flex-shrink:0; }
    .breadcrumb { display:flex; align-items:center; gap:0.4rem; flex:1; overflow:hidden; min-width:0; }
    .bc-sep { color:var(--gold-dim); font-size:0.8rem; flex-shrink:0; }
    .bc-item { color:var(--text-muted); font-size:0.8rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bc-item.link { color:var(--gold); cursor:pointer; flex-shrink:0; }
    .bc-item.link:hover { text-decoration:underline; }
    .header-search {
      width:180px; flex-shrink:0;
      background:var(--surface-2); border:1px solid var(--border);
      border-radius:var(--radius); padding:0.35rem 0.7rem;
      color:var(--text); font-size:0.82rem; transition:border-color var(--transition);
    }
    .header-search:focus { outline:none; border-color:var(--gold); }
    .header-search::placeholder { color:var(--text-muted); }
    .view-toggle-group { display:flex; gap:0.2rem; flex-shrink:0; }
    .vtbtn {
      background:transparent; border:1px solid var(--border);
      color:var(--text-muted); border-radius:var(--radius);
      padding:0.3rem 0.5rem; font-size:1rem; line-height:1;
      transition:all var(--transition);
    }
    .vtbtn:hover { border-color:var(--border-hover); color:var(--gold); }
    .vtbtn.active { background:var(--gold-subtle); border-color:var(--border-hover); color:var(--gold); }
    .settings-btn { background:transparent; border:1px solid var(--border); color:var(--text-muted); border-radius:var(--radius); padding:0.3rem 0.5rem; font-size:1rem; transition:all var(--transition); flex-shrink:0; }
    .settings-btn:hover { border-color:var(--gold); color:var(--gold); }
    .user-pill { display:flex; align-items:center; gap:0.5rem; flex-shrink:0; }
    .user-email { font-size:0.75rem; color:var(--text-muted); max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .signout-btn { background:transparent; border:1px solid var(--border); color:var(--text-muted); border-radius:var(--radius); padding:0.3rem 0.6rem; font-size:0.75rem; transition:all var(--transition); flex-shrink:0; }
    .signout-btn:hover { border-color:#c0392b; color:#c0392b; }

    /* ── Main ───────────────────────────────────────────────── */
    main { max-width:960px; margin:0 auto; padding:2rem 1.5rem 4rem; }

    /* ── View Header ─────────────────────────────────────────── */
    .view-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; gap:1rem; flex-wrap:wrap; }
    .view-title { font-family:var(--font-serif); font-size:1.5rem; font-weight:normal; color:var(--text); }
    .view-title-sub { font-size:0.8rem; color:var(--text-muted); display:block; margin-top:0.1rem; }
    .view-actions { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn { display:inline-flex; align-items:center; gap:0.35rem; padding:0.45rem 1rem; border-radius:var(--radius); border:1px solid transparent; font-size:0.875rem; transition:all var(--transition); white-space:nowrap; }
    .btn-primary { background:var(--gold); color:#0a0a0a; border-color:var(--gold); font-weight:600; }
    .btn-primary:hover { background:#d9b85c; border-color:#d9b85c; }
    .btn-ghost { background:transparent; color:var(--gold); border-color:var(--border-hover); }
    .btn-ghost:hover { background:var(--gold-subtle); }
    .btn-danger { background:transparent; color:var(--danger); border-color:rgba(192,57,43,0.4); }
    .btn-danger:hover { background:var(--danger-dim); }
    .btn-sm { padding:0.3rem 0.65rem; font-size:0.78rem; }
    .btn:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }

    /* ── Card Grid ───────────────────────────────────────────── */
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:1.1rem; }

    /* ── Item Card (places + roads) ──────────────────────────── */
    .item-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-lg); padding:1rem 1rem 0.85rem;
      cursor:pointer; transition:all var(--transition);
      display:flex; flex-direction:column; gap:0.4rem; position:relative;
    }
    .item-card:hover { border-color:var(--border-hover); transform:translateY(-2px); box-shadow:0 6px 24px rgba(201,168,76,0.07); }
    .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem; }
    .card-name { font-family:var(--font-serif); font-size:1rem; color:var(--text); line-height:1.3; flex:1; }
    .card-actions { display:flex; gap:0.2rem; flex-shrink:0; }
    .icon-btn { background:transparent; border:none; padding:0.2rem 0.3rem; border-radius:4px; color:var(--text-muted); font-size:0.9rem; line-height:1; transition:all var(--transition); }
    .icon-btn:hover { color:var(--gold); background:var(--gold-subtle); }
    .icon-btn.del:hover { color:var(--danger); background:var(--danger-dim); }
    .type-badge { display:inline-block; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold-dim); font-weight:600; }
    .card-sub { font-size:0.75rem; color:var(--text-muted); }
    .card-postcode { font-size:0.75rem; color:var(--gold); font-weight:600; letter-spacing:0.03em; }
    .road-last-visit { font-size:0.72rem; color:var(--text-muted); margin-top:3px; }
    .road-last-visit.has-visit { color:var(--gold-dim); }
    .road-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
    .road-tag-chip { font-size:0.68rem; padding:2px 8px; border-radius:20px; font-weight:500; white-space:nowrap; }
    .tag-toggle-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
    .tag-toggle-chip { font-size:0.78rem; padding:4px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; transition:all 0.15s; }
    .tag-toggle-chip.active { background:rgba(201,168,76,0.12); border-color:var(--gold); color:var(--gold); }
    .manage-tags-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
    .manage-tag-row { display:flex; align-items:center; gap:8px; }
    .manage-tag-swatch { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
    .tag-color-options { display:flex; gap:6px; margin-top:6px; }
    .tag-color-opt { width:20px; height:20px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:border-color 0.15s; }
    .tag-color-opt.selected { border-color:var(--text); }

    /* ── List View ───────────────────────────────────────────── */
    .list-view { display:flex; flex-direction:column; gap:0.45rem; }
    .list-item {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:0.7rem 1rem;
      display:flex; align-items:center; gap:0.75rem;
      cursor:pointer; transition:all var(--transition);
    }
    .list-item:hover { border-color:var(--border-hover); background:rgba(201,168,76,0.03); }
    .list-badge { min-width:72px; }
    .list-name { flex:1; font-size:0.92rem; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .list-sub { font-size:0.75rem; color:var(--text-muted); white-space:nowrap; }
    .list-postcode { font-size:0.75rem; color:var(--gold); font-weight:600; white-space:nowrap; margin-right:0.5rem; }
    .list-actions { display:flex; gap:0.2rem; flex-shrink:0; }

    /* ── Section separator ───────────────────────────────────── */
    .section-sep { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold-dim); margin:1.5rem 0 0.75rem; padding-bottom:0.4rem; border-bottom:1px solid var(--border); }

    /* ── Number Grid ─────────────────────────────────────────── */
    .number-grid-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem; display:flex; flex-direction:column; gap:1.1rem; }
    .number-row { display:flex; flex-direction:column; gap:0.5rem; }
    .number-row-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--gold-dim); }
    .number-tiles { display:flex; flex-wrap:wrap; gap:0.5rem; }
    .number-tile { min-width:48px; height:48px; padding:0 0.5rem; border-radius:var(--radius); border:1px solid var(--border); font-size:0.85rem; font-weight:600; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all var(--transition); background:var(--surface-2); color:var(--text-muted); }
    .number-tile:hover { border-color:var(--border-hover); color:var(--text); }
    .number-tile.visited { background:rgba(201,168,76,0.15); border-color:var(--gold-dim); color:var(--gold); }
    .number-tile.visited:hover { background:rgba(201,168,76,0.25); }

    /* ── Modal ───────────────────────────────────────────────── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.78); display:flex; align-items:center; justify-content:center; z-index:200; padding:1rem; overflow-y:auto; }
    .modal-box { background:var(--surface); border:1px solid var(--border-hover); border-radius:var(--radius-lg); padding:1.75rem; width:min(500px,100%); position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.6); margin:auto; }
    .modal-close { position:absolute; top:0.85rem; right:0.9rem; background:transparent; border:none; color:var(--text-muted); font-size:1.3rem; line-height:1; padding:0.2rem; transition:color var(--transition); }
    .modal-close:hover { color:var(--gold); }
    .modal-title { font-family:var(--font-serif); font-size:1.2rem; font-weight:normal; color:var(--text); margin-bottom:1.35rem; padding-right:2rem; }
    .modal-field { margin-bottom:1rem; }
    .modal-label { display:block; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--gold-dim); margin-bottom:0.4rem; }
    .modal-input,.modal-textarea { width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:0.6rem 0.85rem; color:var(--text); transition:border-color var(--transition); }
    .modal-input:focus,.modal-textarea:focus { outline:none; border-color:var(--gold); }
    .modal-input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter:invert(0.7); cursor:pointer; }
    .modal-textarea { min-height:85px; resize:vertical; }
    .modal-error { font-size:0.78rem; color:#e07070; margin-top:0.3rem; display:none; }
    .modal-error.visible { display:block; }
    .modal-footer { display:flex; justify-content:flex-end; gap:0.65rem; margin-top:1.35rem; }
    .modal-footer.spread { justify-content:space-between; }
    .modal-row { display:grid; grid-template-columns:1fr 1fr; gap:0.65rem; }

    /* ── Outcome Chips ───────────────────────────────────────── */
    .outcome-chips { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:0.65rem; }
    .outcome-chip { padding:0.28rem 0.7rem; border-radius:20px; border:1px solid var(--border); background:var(--surface-2); color:var(--text-muted); font-size:0.78rem; cursor:pointer; transition:all var(--transition); user-select:none; }
    .outcome-chip:hover { border-color:var(--border-hover); color:var(--text); }
    .outcome-chip.selected { background:rgba(201,168,76,0.18); border-color:var(--gold); color:var(--gold); }

    /* ── Address Panel ───────────────────────────────────────── */
    .addr-panel-number { font-family:var(--font-serif); font-size:1.4rem; color:var(--text); }
    .addr-panel-road { font-size:0.78rem; color:var(--text-muted); margin-top:0.1rem; margin-bottom:1rem; }
    .addr-last-visit { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:0.7rem 0.9rem; margin-bottom:0.85rem; }
    .addr-last-label { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold-dim); margin-bottom:0.25rem; }
    .addr-last-outcome { font-size:0.88rem; color:var(--text); }
    .addr-last-meta { font-size:0.72rem; color:var(--text-muted); margin-top:0.2rem; }
    .history-toggle-btn { background:none; border:none; color:var(--gold-dim); font-size:0.75rem; text-transform:uppercase; letter-spacing:0.07em; cursor:pointer; padding:0; margin-bottom:0.5rem; transition:color var(--transition); }
    .history-toggle-btn:hover { color:var(--gold); }
    .history-section { max-height:0; overflow:hidden; transition:max-height 0.3s ease; }
    .history-section.expanded { max-height:1400px; }
    .history-list { display:flex; flex-direction:column; gap:0.55rem; margin-bottom:0.75rem; }
    .history-item { border-left:2px solid var(--gold-dim); padding-left:0.8rem; }
    .history-item-date { font-size:0.72rem; color:var(--gold); margin-bottom:0.1rem; }
    .history-item-outcome { font-size:0.85rem; color:var(--text); line-height:1.5; }
    .history-item-by { font-size:0.7rem; color:var(--text-muted); margin-top:0.12rem; }
    .history-empty { font-size:0.82rem; color:var(--text-muted); font-style:italic; }

    /* ── Settings ────────────────────────────────────────────── */
    .settings-chip-list { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.45rem; }
    .settings-chip { display:inline-flex; align-items:center; gap:0.3rem; padding:0.22rem 0.6rem; background:var(--surface-2); border:1px solid var(--border); border-radius:20px; font-size:0.76rem; color:var(--text); }
    .settings-chip-remove { background:none; border:none; color:var(--text-muted); font-size:0.88rem; line-height:1; padding:0; cursor:pointer; transition:color var(--transition); }
    .settings-chip-remove:hover { color:var(--danger); }
    .settings-add-row { display:flex; gap:0.45rem; margin-top:0.55rem; }
    .settings-add-row .modal-input { flex:1; }

    /* ── Import Feedback ─────────────────────────────────────── */
    .import-feedback { font-size:0.8rem; padding:0.45rem 0.85rem; border-radius:var(--radius); margin-bottom:0.85rem; border:1px solid transparent; }
    .import-feedback.success { background:rgba(201,168,76,0.1); border-color:var(--gold-dim); color:var(--gold); }
    .import-feedback.error { background:rgba(224,112,112,0.1); border-color:rgba(224,112,112,0.4); color:#e07070; }

    /* ── Empty State ─────────────────────────────────────────── */
    .empty-state { grid-column:1/-1; padding:2.5rem 1.5rem; text-align:center; color:var(--text-muted); font-size:0.88rem; border:1px dashed var(--border); border-radius:var(--radius-lg); }
    .empty-state-hint { margin-top:0.35rem; font-size:0.78rem; color:var(--gold-dim); }
    .confirm-msg { font-size:0.92rem; color:var(--text); margin-bottom:1.35rem; line-height:1.6; }

    /* ── Utility ─────────────────────────────────────────────── */
    .hidden { display:none !important; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width:560px) {
      main { padding:1.25rem 0.85rem 3rem; }
      .app-header { padding:0 0.85rem; gap:0.5rem; }
      .header-search { width:120px; }
      .app-title { font-size:1rem; }
      .card-grid { grid-template-columns:1fr; }
      .modal-box { padding:1.35rem 1.1rem; }
      .modal-row { grid-template-columns:1fr; }
      .number-tile { min-width:44px; height:44px; font-size:0.78rem; }
      .view-header { flex-direction:column; align-items:flex-start; }
    }
  /* ── Leaflet Map Modal ───────────────────────────────────── */
  .map-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:1000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1rem; }
  .map-modal-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); width:100%; max-width:640px; overflow:hidden; }
  .map-modal-header { padding:0.85rem 1.1rem; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
  .map-modal-header h3 { font-family:var(--font-serif); color:var(--gold); font-size:1rem; font-weight:normal; }
  #leaflet-map { width:100%; height:340px; }
  .map-modal-footer { padding:0.75rem 1.1rem; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); gap:0.75rem; }
  .map-coords { font-size:0.78rem; color:var(--text-muted); flex:1; }

  /* ── Find Location Screen ───────────────────────────────── */
  .find-location-screen { display:flex; align-items:center; justify-content:center; min-height:calc(100vh - var(--header-h)); padding:2rem 1rem; }
  .find-location-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2.5rem 2rem; width:100%; max-width:520px; box-shadow:0 12px 40px rgba(0,0,0,0.4); }
  .find-location-title { font-family:var(--font-serif); font-size:1.4rem; color:var(--gold); margin-bottom:0.5rem; }
  .find-location-sub { font-size:0.85rem; color:var(--text-muted); margin-bottom:1.5rem; line-height:1.6; }
  .join-result-card { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:0.75rem 1rem; display:flex; align-items:center; gap:0.75rem; }
  .join-result-info { flex:1; min-width:0; }
  .join-result-name { font-size:0.88rem; color:var(--text); font-weight:500; }
  .join-result-addr { font-size:0.75rem; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .join-request-status { font-size:0.75rem; padding:0.25rem 0.6rem; border-radius:20px; border:1px solid; }
  .join-request-status.pending  { color:#C9A84C; border-color:#C9A84C; }
  .join-request-status.approved { color:#50c878; border-color:#50c878; }
  .join-request-status.rejected { color:#e05c5c; border-color:#e05c5c; }
  .find-location-sep { font-size:0.78rem; color:var(--text-muted); margin:1rem 0 0.5rem; }

  /* ── OSM Location Search ────────────────────────────────── */
  .loc-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:1.1rem; }
  .loc-tab { flex:1; padding:0.55rem; text-align:center; font-size:0.85rem; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; transition:all var(--transition); user-select:none; }
  .loc-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
  .osm-search-row { display:flex; gap:0.5rem; margin-bottom:0.75rem; }
  .osm-search-row .modal-input { flex:1; }
  .osm-results { display:flex; flex-direction:column; gap:0.5rem; max-height:260px; overflow-y:auto; margin-bottom:0.75rem; }
  .osm-result-card { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius); padding:0.65rem 0.85rem; cursor:pointer; transition:all var(--transition); }
  .osm-result-card:hover, .osm-result-card.selected { border-color:var(--gold); background:var(--gold-subtle); }
  .osm-result-name { font-size:0.88rem; color:var(--text); font-weight:500; }
  .osm-result-addr { font-size:0.75rem; color:var(--text-muted); margin-top:0.2rem; }
  .osm-status { font-size:0.82rem; color:var(--text-muted); text-align:center; padding:0.75rem; }
  .loc-type-row { display:flex; gap:0.5rem; margin-bottom:0.75rem; }
  .loc-type-btn { flex:1; padding:0.45rem; border:1px solid var(--border); border-radius:var(--radius); background:transparent; color:var(--text-muted); font-size:0.82rem; cursor:pointer; transition:all var(--transition); }
  .loc-type-btn.active { border-color:var(--gold); color:var(--gold); background:var(--gold-subtle); }

  /* ── Light Theme ─────────────────────────────────────────── */
  :root[data-theme="light"] {
    --bg:           #f5f3ee;
    --surface:      #ffffff;
    --surface-2:    #f0ece3;
    --gold:         #9a6f28;
    --gold-dim:     #7a5820;
    --gold-subtle:  rgba(154,111,40,0.08);
    --text:         #1a1a1a;
    --text-muted:   #6b6355;
    --border:       rgba(154,111,40,0.25);
    --border-hover: rgba(154,111,40,0.55);
    --danger:       #c0392b;
    --danger-dim:   rgba(192,57,43,0.12);
  }
  :root[data-theme="light"] .app-header {
    background: rgba(245,243,238,0.95);
  }

  /* ── Theme Toggle Buttons ────────────────────────────────── */
  .theme-toggle-group { display:flex; gap:0.4rem; }
  .theme-btn {
    background: transparent; border:1px solid var(--border);
    color:var(--text-muted); border-radius:var(--radius);
    padding:0.3rem 0.75rem; font-size:0.8rem; cursor:pointer;
    transition:all var(--transition);
  }
  .theme-btn.active { background:var(--gold-subtle); border-color:var(--gold); color:var(--gold); }
  .theme-btn:hover:not(.active) { border-color:var(--border-hover); color:var(--text); }

  </style>
</head>
<body>

  <header class="app-header">
    <h1 class="app-title">Road Visits</h1>
    <div class="header-divider"></div>
    <nav id="breadcrumb" class="breadcrumb" aria-label="Navigation"></nav>
    <input type="search" id="global-search" class="header-search" placeholder="Search...">
    <div class="view-toggle-group" id="view-toggle-group">
      <button id="btn-view-grid" class="vtbtn active" title="Grid view">⊞</button>
      <button id="btn-view-list" class="vtbtn" title="List view">≡</button>
    </div>
    <button id="btn-theme-toggle" class="settings-btn" title="Toggle theme" style="font-size:1rem;">🌙</button>
    <button id="btn-settings" class="settings-btn" title="Settings">&#9881;</button>
    <div class="user-pill">
      <span id="user-email" class="user-email"></span>
      <button id="btn-signout" class="signout-btn" title="Sign out">Sign out</button>
    </div>
  </header>

  <main>
    <!-- VIEW: Place Hierarchy -->
    <section id="view-places">
      <div id="places-view-header" class="view-header"></div>
      <div id="places-container"></div>
    </section>

    <!-- VIEW: Roads in a Postcode -->
    <section id="view-roads" class="hidden">
      <div id="roads-view-header" class="view-header"></div>
      <div id="import-feedback" class="import-feedback hidden"></div>
      <input type="file" id="csv-file-input" accept=".csv" class="hidden">
      <div id="roads-container"></div>
    </section>

    <!-- VIEW: Address Number Grid -->
    <section id="view-addresses" class="hidden">
      <div id="addresses-view-header" class="view-header"></div>
      <div id="number-grid-container"></div>
    </section>
  </main>

  <!-- VIEW: Find Your Location (shown when user has no location) -->
  <div id="view-find-location" class="hidden find-location-screen">
    <div class="find-location-card">
      <h2 class="find-location-title">Welcome! Find your location</h2>
      <p class="find-location-sub">Search for your mosque or organisation to request access, or create your own private workspace.</p>
      <div class="osm-search-row" style="margin-bottom:0.75rem">
        <input type="text" id="join-search-input" class="modal-input" placeholder="e.g. Al-Noor Mosque London" />
        <button id="join-search-btn" class="btn btn-ghost">Search</button>
      </div>
      <div id="join-results" class="osm-results"></div>
      <div id="join-requests-list"></div>
      <div style="text-align:center;margin-top:1rem">
        <button id="btn-create-own" class="btn btn-ghost btn-sm">or create my own private workspace →</button>
      </div>
    </div>
  </div>

  <!-- Leaflet Map Modal -->
  <div id="map-modal" class="map-modal-overlay hidden">
    <div class="map-modal-box">
      <div class="map-modal-header">
        <h3>📍 Set Road Location — click on the map to pin</h3>
        <button id="map-modal-close" class="icon-btn">✕</button>
      </div>
      <div id="leaflet-map"></div>
      <div class="map-modal-footer">
        <span id="map-coords" class="map-coords">Click the map to pin a location</span>
        <button id="map-gps-btn" class="btn btn-ghost btn-sm">📍 Use My GPS</button>
        <button id="map-clear-btn" class="btn btn-ghost btn-sm">Clear</button>
        <button id="map-save-btn" class="btn btn-primary btn-sm">Save Location</button>
      </div>
      <div id="map-hierarchy" style="padding:0.4rem 1.1rem 0.6rem;font-size:0.75rem;color:var(--gold-dim);min-height:1.4rem;"></div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-box" id="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
  // Apply saved theme immediately (before render to avoid flash)
  (function() {
    const t = localStorage.getItem('rvt_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  }());

  (function () {
    'use strict';

    const DEFAULT_OUTCOMES = ['No Answer','Left Leaflet','Interested','Not Interested','Called Back','Moved Away','Revisit Needed','Declined'];

    /* ── Constants ────────────────────────────────────────── */
    // Root shows Locations directly. Country/City/Town are labels on locations, not nav layers.
    const CHILD_TYPE  = { root:'location' };
    const TYPE_LABEL  = { location:'Location' };
    const TYPE_PLURAL = { location:'Locations' };

    /* ── In-Memory Cache (populated by initCache in module script) ── */
    const _cache = {
      places: [], roads: [], addresses: [], visits: [],
      tags: {},          // locationId → tag[]
      outcomes: null,    // null = use DEFAULT_OUTCOMES
      settings: { currentUser: '' },
    };

    /* ── Cache Reads (synchronous — same interface as before) ── */
    function loadPlaces()    { return _cache.places; }
    function loadRoads()     { return _cache.roads; }
    function loadAddresses() { return _cache.addresses; }
    function loadVisits()    { return _cache.visits; }
    function loadOutcomes()  { return _cache.outcomes || DEFAULT_OUTCOMES.slice(); }
    function loadSettings()  { return _cache.settings; }
    function loadTags(lid)   { return _cache.tags[lid || 'ungrouped'] || []; }

    /* ── Cache Writes (update cache; Supabase writes fired separately) ── */
    function savePlaces(d)    { _cache.places = d; }
    function saveRoads(d)     { _cache.roads = d; }
    function saveAddresses(d) { _cache.addresses = d; }
    function saveVisits(d)    { _cache.visits = d; }
    function saveTags(lid, d) { _cache.tags[lid || 'ungrouped'] = d; }
    function saveOutcomes(d)  { _cache.outcomes = d; _syncPreferences({ outcomes: d }); }
    function saveSettings(d)  { _cache.settings = d; if (d.currentUser) _syncProfileName(d.currentUser); }

    /* ── UID — real UUIDv4 so IDs are valid for Supabase ────── */
    function uid() {
      return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
    }

    /* ── Toast notification ──────────────────────────────────── */
    function _showToast(msg, isError) {
      const t = document.createElement('div');
      t.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);padding:0.65rem 1.4rem;border-radius:10px;font-size:0.88rem;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.5);pointer-events:none;';
      t.style.background = isError ? '#c0392b' : 'var(--gold)';
      t.style.color = isError ? '#fff' : '#0a0a0a';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }

    /* ── Supabase sync helpers (fire-and-forget, toast on error) ─ */
    async function _syncWrite(fn) {
      try { await fn(); }
      catch(e) { console.error('Sync error:', e); _showToast('Could not save: ' + (e.message || 'unknown error'), true); }
    }

    function _syncCreatePlace(p) {
      if (!window._rvtDb || !window._rvtUserId) return;
      _syncWrite(() => window._rvtDb.from('places').insert({
        id: p.id, type: 'location', name: p.name,
        location_type: p.locationType || null, location_type_label: p.locationTypeLabel || null,
        country: p.country || null, city: p.city || null, town: p.town || null,
        lat: p.lat || null, lng: p.lng || null,
        osm_place_id: p.osmPlaceId || null, address: p.address || null,
        owner_id: window._rvtUserId, created_by: window._rvtUserId,
      }).then(r => { if (r.error) throw r.error; }));
    }
    function _syncUpdatePlace(id, updates) {
      if (!window._rvtDb) return;
      _syncWrite(() => window._rvtDb.from('places').update(updates).eq('id', id).then(r => { if (r.error) throw r.error; }));
    }
    function _syncDeletePlace(id) {
      if (!window._rvtDb) return;
      // Use RPC for cascade soft-delete (handles roads/addresses/visits)
      _syncWrite(() => window._rvtDb.rpc('fn_soft_delete_place', { p_place_id: id }).then(r => { if (r.error) throw r.error; }));
    }

    function _syncCreateRoad(r) {
      if (!window._rvtDb || !window._rvtUserId) return;
      _syncWrite(() => window._rvtDb.from('roads').insert({
        id: r.id, name: r.name, postcode: r.postcode || null,
        location_id: r.locationId || null,
        lat: r.lat || null, lng: r.lng || null,
        country: r.country || null, city: r.city || null, town: r.town || null,
        owner_id: window._rvtUserId, created_by: window._rvtUserId,
      }).then(res => { if (res.error) throw res.error; }));
    }
    function _syncUpdateRoad(id, updates) {
      if (!window._rvtDb) return;
      _syncWrite(() => window._rvtDb.from('roads').update(updates).eq('id', id).then(r => { if (r.error) throw r.error; }));
    }
    function _syncDeleteRoad(id) {
      if (!window._rvtDb) return;
      const now = new Date().toISOString();
      _syncWrite(async () => {
        const { error: re } = await window._rvtDb.from('roads').update({ deleted_at: now }).eq('id', id);
        if (re) throw re;
        await window._rvtDb.from('addresses').update({ deleted_at: now }).eq('road_id', id);
      });
    }

    function _syncCreateAddress(a) {
      if (!window._rvtDb || !window._rvtUserId) return;
      _syncWrite(() => window._rvtDb.from('addresses').insert({
        id: a.id, road_id: a.roadId, address: a.address,
        owner_id: window._rvtUserId, created_by: window._rvtUserId,
      }).then(r => { if (r.error) throw r.error; }));
    }
    function _syncDeleteAddress(id) {
      if (!window._rvtDb) return;
      const now = new Date().toISOString();
      _syncWrite(async () => {
        const { error: ae } = await window._rvtDb.from('addresses').update({ deleted_at: now }).eq('id', id);
        if (ae) throw ae;
        await window._rvtDb.from('visits').update({ deleted_at: now }).eq('address_id', id);
      });
    }

    function _syncCreateVisit(v) {
      if (!window._rvtDb || !window._rvtUserId) return;
      _syncWrite(() => window._rvtDb.from('visits').insert({
        id: v.id, address_id: v.addressId, outcome: v.outcome,
        visited_at: v.timestamp, entered_by_name: v.enteredBy || null,
        entered_by_user_id: window._rvtUserId,
      }).then(r => { if (r.error) throw r.error; }));
    }

    function _syncCreateTag(tag, locationId) {
      if (!window._rvtDb || !window._rvtUserId) return;
      _syncWrite(() => window._rvtDb.from('road_tags').insert({
        id: tag.id, location_id: locationId, name: tag.name, color: tag.color,
        owner_id: window._rvtUserId,
      }).then(r => { if (r.error) throw r.error; }));
    }
    function _syncDeleteTag(id) {
      if (!window._rvtDb) return;
      _syncWrite(() => window._rvtDb.from('road_tags').update({ deleted_at: new Date().toISOString() }).eq('id', id).then(r => { if (r.error) throw r.error; }));
    }
    function _syncTagAssignments(roadId, tagIds) {
      if (!window._rvtDb) return;
      _syncWrite(async () => {
        const { error: de } = await window._rvtDb.from('road_tag_assignments').delete().eq('road_id', roadId);
        if (de) throw de;
        if (tagIds.length) {
          const { error: ie } = await window._rvtDb.from('road_tag_assignments').insert(tagIds.map(tid => ({ road_id: roadId, tag_id: tid })));
          if (ie) throw ie;
        }
      });
    }

    function _syncPreferences(partial) {
      if (!window._rvtDb || !window._rvtUserId) return;
      _syncWrite(async () => {
        const { data: cur } = await window._rvtDb.from('profiles').select('preferences').eq('id', window._rvtUserId).single();
        const merged = { ...(cur?.preferences || {}), ...partial };
        const { error } = await window._rvtDb.from('profiles').update({ preferences: merged, updated_at: new Date().toISOString() }).eq('id', window._rvtUserId);
        if (error) throw error;
      });
    }
    function _syncProfileName(name) {
      if (!window._rvtDb || !window._rvtUserId) return;
      _syncWrite(() => window._rvtDb.from('profiles').update({ full_name: name, updated_at: new Date().toISOString() }).eq('id', window._rvtUserId).then(r => { if (r.error) throw r.error; }));
    }

    /* ── State ────────────────────────────────────────────── */
    const state = {
      view:             'places',   // 'places' | 'roads' | 'addresses'
      placeStack:       [],         // [{id, type, name}] — breadcrumb trail
      currentPlaceId:   null,       // place whose children we show (null = root)
      currentLocationId:null,        // location id for roads view ('__ungrouped__' for ungrouped)
      currentRoadId:    null,
      viewMode:         'grid',     // 'grid' | 'list'
      roadSort:         'last_visited_desc', // 'last_visited_desc'|'last_visited_asc'|'name_asc'
      search:           '',
    };

    /* ── Navigation ───────────────────────────────────────── */
    function clearSearch() {
      state.search = '';
      document.getElementById('global-search').value = '';
    }

    function navigateToRoot() {
      state.placeStack = []; state.currentPlaceId = null;
      state.view = 'places'; clearSearch(); render();
    }

    function navigateIntoPlace(place) {
      state.placeStack.push({ id:place.id, type:place.type, name:place.name });
      clearSearch();
      if (place.type === 'location') {
        state.view = 'roads'; state.currentLocationId = place.id;
      } else {
        state.view = 'places'; state.currentPlaceId = place.id;
      }
      render();
    }

    function navigateToUngrouped() {
      state.placeStack.push({ id:'__ungrouped__', type:'ungrouped', name:'Ungrouped Roads' });
      state.currentLocationId = '__ungrouped__';
      state.view = 'roads'; clearSearch(); render();
    }

    function navigateIntoRoad(road) {
      state.placeStack.push({ id:road.id, type:'road', name:road.name });
      state.currentRoadId = road.id;
      state.view = 'addresses'; clearSearch(); render();
    }

    function navigateBackTo(idx) {
      // idx = -1 means root
      if (idx < 0) { navigateToRoot(); return; }
      const target = state.placeStack[idx];
      state.placeStack = state.placeStack.slice(0, idx + 1);
      clearSearch();
      if (target.type === 'road') {
        state.view = 'addresses'; state.currentRoadId = target.id;
      } else if (target.type === 'location') {
        state.view = 'roads'; state.currentLocationId = target.id;
      } else if (target.type === 'ungrouped') {
        state.view = 'roads'; state.currentLocationId = '__ungrouped__';
      } else {
        state.view = 'places'; state.currentPlaceId = target.id;
      }
      render();
    }

    /* ── Breadcrumb ───────────────────────────────────────── */
    function updateBreadcrumb() {
      const bc = document.getElementById('breadcrumb');
      bc.innerHTML = '';

      const homeEl = document.createElement('span');
      homeEl.className = 'bc-item' + (state.placeStack.length ? ' link' : '');
      homeEl.textContent = 'Home';
      if (state.placeStack.length) homeEl.addEventListener('click', () => navigateBackTo(-1));
      bc.appendChild(homeEl);

      state.placeStack.forEach((item, i) => {
        const sep = document.createElement('span');
        sep.className = 'bc-sep'; sep.textContent = '/';
        bc.appendChild(sep);
        const el = document.createElement('span');
        const isLast = i === state.placeStack.length - 1;
        el.className = 'bc-item' + (isLast ? '' : ' link');
        el.textContent = item.name;
        if (!isLast) el.addEventListener('click', () => navigateBackTo(i));
        bc.appendChild(el);
      });

      // Show/hide search and toggle for addresses view
      const searchEl = document.getElementById('global-search');
      const toggleEl = document.getElementById('view-toggle-group');
      if (state.view === 'addresses') {
        searchEl.classList.add('hidden');
        toggleEl.classList.add('hidden');
      } else {
        searchEl.classList.remove('hidden');
        toggleEl.classList.remove('hidden');
      }
    }

    /* ── Helpers ──────────────────────────────────────────── */
    function formatDate(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}) + ' at ' + d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
      } catch(e) { return ''; }
    }
    function toDatetimeLocal(date) {
      const d = date || new Date();
      const p = n => String(n).padStart(2,'0');
      return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
    }
    function getLastVisit(addressId) {
      const v = loadVisits().filter(v => v.addressId === addressId);
      return v.length ? v.sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp))[0] : null;
    }
    function getLastVisitForRoad(roadId) {
      const addrIds = new Set(loadAddresses().filter(a => a.roadId === roadId).map(a => a.id));
      if (!addrIds.size) return null;
      const visits = loadVisits().filter(v => addrIds.has(v.addressId));
      if (!visits.length) return null;
      return visits.sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp))[0];
    }
    function formatDateShort(iso) {
      if (!iso) return '';
      try { return new Date(iso).toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}); }
      catch(e) { return ''; }
    }
    function parseAddressNumber(addr) {
      const m = String(addr).match(/\d+/); return m ? parseInt(m[0],10) : null;
    }
    function getPlaceChildCount(placeId) {
      // count places children + roads if postcode
      const p = loadPlaces().find(x => x.id === placeId);
      if (!p) return 0;
      if (p.type === 'location') return loadRoads().filter(r => r.locationId === placeId).length;
      return loadPlaces().filter(x => x.parentId === placeId).length;
    }
    function childLabel(placeType) {
      return placeType === 'location' ? 'Roads' : 'Locations';
    }
    function getAllDescendantPlaceIds(placeId) {
      const all = loadPlaces();
      const result = [], queue = [placeId];
      while (queue.length) {
        const pid = queue.shift();
        all.filter(p => p.parentId === pid).forEach(c => { result.push(c.id); queue.push(c.id); });
      }
      return result;
    }

    /* ── Delete Place (cascade) ───────────────────────────── */
    function deletePlace(placeId) {
      const place = loadPlaces().find(p => p.id === placeId);
      openConfirm({
        message: `Delete "${place ? place.name : 'this item'}"? All nested items, roads, addresses, and visit history inside it will be permanently removed.`,
        confirmLabel: 'Delete',
        onConfirm() {
          const descIds = getAllDescendantPlaceIds(placeId);
          const allPlaceIds = new Set([placeId, ...descIds]);
          const affRoads = loadRoads().filter(r => allPlaceIds.has(r.locationId));
          const affRoadIds = new Set(affRoads.map(r => r.id));
          const affAddrs = loadAddresses().filter(a => affRoadIds.has(a.roadId));
          const affAddrIds = new Set(affAddrs.map(a => a.id));
          savePlaces(loadPlaces().filter(p => !allPlaceIds.has(p.id)));
          saveRoads(loadRoads().filter(r => !affRoadIds.has(r.id)));
          saveAddresses(loadAddresses().filter(a => !affAddrIds.has(a.roadId)));
          saveVisits(loadVisits().filter(v => !affAddrIds.has(v.addressId)));
          // DB cascade: RPC soft-deletes the place + all nested data in one transaction
          _syncDeletePlace(placeId);
          // If we were inside this place, go up
          if (state.placeStack.some(s => s.id === placeId)) navigateToRoot();
          else render();
        }
      });
    }

    /* ── Delete Road ──────────────────────────────────────── */
    function deleteRoad(roadId) {
      const road = loadRoads().find(r => r.id === roadId);
      openConfirm({
        message: `Delete "${road ? road.name : 'this road'}"? All addresses and visit history will also be removed.`,
        confirmLabel: 'Delete Road',
        onConfirm() {
          const addrs = loadAddresses().filter(a => a.roadId === roadId);
          const addrIds = new Set(addrs.map(a => a.id));
          saveRoads(loadRoads().filter(r => r.id !== roadId));
          saveAddresses(loadAddresses().filter(a => a.roadId !== roadId));
          saveVisits(loadVisits().filter(v => !addrIds.has(v.addressId)));
          _syncDeleteRoad(roadId);
          if (state.currentRoadId === roadId) navigateBackTo(state.placeStack.length - 2);
          else render();
        }
      });
    }

    /* ── Create Place Card ────────────────────────────────── */
    function createPlaceCard(place) {
      const count = getPlaceChildCount(place.id);
      const card = document.createElement('div');
      card.className = 'item-card';

      const top = document.createElement('div');
      top.className = 'card-top';
      const nameWrap = document.createElement('div');
      const badge = document.createElement('div');
      badge.className = 'type-badge';
      badge.textContent = TYPE_LABEL[place.type] || place.type;
      const nameEl = document.createElement('div');
      nameEl.className = 'card-name';
      nameEl.textContent = place.name;
      nameWrap.appendChild(badge);
      nameWrap.appendChild(nameEl);

      const acts = document.createElement('div');
      acts.className = 'card-actions';
      if (place.type === 'location') {
        const shareBtn = document.createElement('button');
        shareBtn.className = 'icon-btn'; shareBtn.title = 'Invite / Manage Members'; shareBtn.textContent = '👥';
        shareBtn.addEventListener('click', e => { e.stopPropagation(); openMembersModal(place.id); });
        acts.appendChild(shareBtn);

      const delBtn = document.createElement('button');
      delBtn.className = 'icon-btn del'; delBtn.title = 'Delete'; delBtn.textContent = '🗑';

    /* ── Create Road Card ─────────────────────────────────── */
    function createRoadCard(road) {
      const addrCount = loadAddresses().filter(a => a.roadId === road.id).length;
      const lv = getLastVisitForRoad(road.id);
      const tags = loadTags(road.locationId);
      const roadTags = (road.tags || []).map(tid => tags.find(t => t.id === tid)).filter(Boolean);

      const card = document.createElement('div');
      card.className = 'item-card';

      const top = document.createElement('div');
      top.className = 'card-top';
      const nameWrap = document.createElement('div');
      nameWrap.style.flex = '1';
      const nameEl = document.createElement('div');
      nameEl.className = 'card-name'; nameEl.textContent = road.name;
      nameWrap.appendChild(nameEl);
      if (road.postcode) {
        const pc = document.createElement('div');
        pc.className = 'card-postcode'; pc.textContent = road.postcode;
        nameWrap.appendChild(pc);
      }

      const acts = document.createElement('div');
      acts.className = 'card-actions';
      const mapBtn = document.createElement('button');
      mapBtn.className = 'icon-btn'; mapBtn.title = road.lat ? 'Location set — click to change' : 'Set location on map';
      mapBtn.textContent = road.lat ? '📍' : '🗺';
      mapBtn.style.opacity = road.lat ? '1' : '0.45';

      // Tag button — only show if location has tags defined

        acts.appendChild(tagBtn);
      }
      const editBtn = document.createElement('button');
      editBtn.className = 'icon-btn'; editBtn.title = 'Edit'; editBtn.textContent = '✏';
      editBtn.addEventListener('click', e => { e.stopPropagation(); openEditRoadModal(road.id); });
      const delBtn = document.createElement('button');
      delBtn.className = 'icon-btn del'; delBtn.title = 'Delete'; delBtn.textContent = '🗑';
      delBtn.addEventListener('click', e => { e.stopPropagation(); deleteRoad(road.id); });
      acts.appendChild(mapBtn); acts.appendChild(editBtn); acts.appendChild(delBtn);

      top.appendChild(nameWrap); top.appendChild(acts);

      const sub = document.createElement('div');
      sub.className = 'card-sub';
