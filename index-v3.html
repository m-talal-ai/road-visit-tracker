    /* ── Render Places ────────────────────────────────────── */
    function renderPlaces() {
      // Root always shows all locations. Country/City/Town are label attributes, not nav layers.
      const hdr = document.getElementById('places-view-header');
      hdr.innerHTML = '';
      const titleDiv = document.createElement('div');
      const titleEl = document.createElement('h2');
      titleEl.className = 'view-title';
      titleEl.textContent = 'Your Locations';
      titleDiv.appendChild(titleEl);
      hdr.appendChild(titleDiv);

      const addBtn = document.createElement('button');
      addBtn.className = 'btn btn-primary';
      addBtn.textContent = '+ Add Location';
      addBtn.addEventListener('click', () => openNewPlaceModal(null, 'location'));
      hdr.appendChild(addBtn);

      // Get all locations
      let items = loadPlaces().filter(p => p.type === 'location');
      if (state.search) items = items.filter(p => p.name.toLowerCase().includes(state.search));
      items.sort((a,b) => a.name.localeCompare(b.name));

      const container = document.getElementById('places-container');
      container.innerHTML = '';

      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        if (state.search) {
          empty.textContent = 'No results for "' + state.search + '".';
        } else {
          empty.innerHTML = '<div>No locations yet.</div><div class="empty-state-hint">Click "+ Add Location" or use the search below to find and join one.</div>';
        }
        container.appendChild(empty);
      } else {
        const grid = document.createElement('div');
        grid.className = state.viewMode === 'grid' ? 'card-grid' : 'list-view';
        items.forEach(p => grid.appendChild(state.viewMode === 'grid' ? createPlaceCard(p) : createPlaceListItem(p)));
        container.appendChild(grid);
      }

      // Ungrouped roads at root only
      if (!state.currentPlaceId && !state.search) {
        const ungrouped = loadRoads().filter(r => !r.locationId);
        if (ungrouped.length) {
          const sep = document.createElement('div');
          sep.className = 'section-sep'; sep.textContent = 'Ungrouped Roads';
          container.appendChild(sep);
          const ugGrid = document.createElement('div');
          ugGrid.className = state.viewMode === 'grid' ? 'card-grid' : 'list-view';
          const ugCard = state.viewMode === 'grid'
            ? createUngroupedCard(ungrouped.length)
            : createUngroupedListItem(ungrouped.length);
          ugGrid.appendChild(ugCard);
          container.appendChild(ugGrid);
        }
      }
    }

    function createUngroupedCard(count) {
      const card = document.createElement('div');
      card.className = 'item-card';
      const badge = document.createElement('div');
      badge.className = 'type-badge'; badge.textContent = 'Roads';
      const name = document.createElement('div');
      name.className = 'card-name'; name.textContent = 'Ungrouped Roads';
      const sub = document.createElement('div');
      sub.className = 'card-sub'; sub.textContent = count + ' road' + (count !== 1 ? 's' : '') + ' not yet assigned to a postcode';
      card.appendChild(badge); card.appendChild(name); card.appendChild(sub);
      card.addEventListener('click', navigateToUngrouped);
      return card;
    }

    function createUngroupedListItem(count) {
      const item = document.createElement('div');
      item.className = 'list-item';
      const badge = document.createElement('div');
      badge.className = 'type-badge list-badge'; badge.textContent = 'Roads';
      const name = document.createElement('div');
      name.className = 'list-name'; name.textContent = 'Ungrouped Roads';
      const sub = document.createElement('div');
      sub.className = 'list-sub'; sub.textContent = count + ' road' + (count !== 1 ? 's' : '');
      item.appendChild(badge); item.appendChild(name); item.appendChild(sub);
      item.addEventListener('click', navigateToUngrouped);
      return item;
    }

    /* ── Render Roads ─────────────────────────────────────── */
    function renderRoads() {
      const locationId = state.currentLocationId;
      const isUngrouped = locationId === '__ungrouped__';
      const location = isUngrouped ? null : loadPlaces().find(p => p.id === locationId);

      // Header
      const hdr = document.getElementById('roads-view-header');
      hdr.innerHTML = '';
      const titleEl = document.createElement('h2');
      titleEl.className = 'view-title';
      titleEl.textContent = isUngrouped ? 'Ungrouped Roads' : 'Roads' + (location ? ' in ' + location.name : '');
      const acts = document.createElement('div');
      acts.className = 'view-actions';

      // Members + join request buttons for all non-ungrouped locations
      if (!isUngrouped && location) {
        const membersBtn = document.createElement('button');
        membersBtn.className = 'btn btn-ghost btn-sm';
        membersBtn.textContent = '👥 Members';
        membersBtn.addEventListener('click', () => openMembersModal(locationId));
        acts.appendChild(membersBtn);

        const reqs = JSON.parse(localStorage.getItem('rvt_join_requests') || '[]')
          .filter(r => r.locationId === locationId && r.status === 'pending');
        if (reqs.length) {
          const reqsBtn = document.createElement('button');
          reqsBtn.className = 'btn btn-ghost btn-sm';
          reqsBtn.textContent = '📋 Requests (' + reqs.length + ')';
          reqsBtn.addEventListener('click', () => openJoinRequestsModal(locationId));
          acts.appendChild(reqsBtn);
        }
      }

      // Sort toggle
      const sortLabels = {'last_visited_desc':'↓ Last Visit','last_visited_asc':'↑ Last Visit','name_asc':'A–Z'};
      const sortBtn = document.createElement('button');
      sortBtn.className = 'btn btn-ghost btn-sm';
      sortBtn.textContent = sortLabels[state.roadSort] || '↓ Last Visit';
      sortBtn.title = 'Toggle sort order';
      sortBtn.addEventListener('click', () => {
        const cycle = {'last_visited_desc':'last_visited_asc','last_visited_asc':'name_asc','name_asc':'last_visited_desc'};
        state.roadSort = cycle[state.roadSort] || 'last_visited_desc';
        render();
      });
      acts.appendChild(sortBtn);

      // Tags button (non-ungrouped only)
      if (!isUngrouped) {
        const tagsBtn = document.createElement('button');
        tagsBtn.className = 'btn btn-ghost btn-sm';
        tagsBtn.textContent = '🏷 Tags';
        tagsBtn.addEventListener('click', () => openManageTagsModal(locationId));
        acts.appendChild(tagsBtn);
      }

      const dlBtn = document.createElement('button');
      dlBtn.className = 'btn btn-ghost btn-sm'; dlBtn.textContent = 'Download Template';
      dlBtn.addEventListener('click', downloadTemplate);
      const impBtn = document.createElement('button');
      impBtn.className = 'btn btn-ghost btn-sm'; impBtn.textContent = 'Import CSV';
      impBtn.addEventListener('click', () => { document.getElementById('csv-file-input').value = ''; document.getElementById('csv-file-input').click(); });
      const addBtn = document.createElement('button');
      addBtn.className = 'btn btn-primary'; addBtn.textContent = '+ Add Road';
      addBtn.addEventListener('click', () => openNewRoadModal(isUngrouped ? null : locationId));
      acts.appendChild(dlBtn); acts.appendChild(impBtn); acts.appendChild(addBtn);
      hdr.appendChild(titleEl); hdr.appendChild(acts);

      // Get roads
      let roads = isUngrouped
        ? loadRoads().filter(r => !r.locationId)
        : loadRoads().filter(r => r.locationId === locationId);

      if (state.search) {
        const q = state.search;
        roads = roads.filter(r =>
          r.name.toLowerCase().includes(q) ||
          (r.postcode || '').toLowerCase().includes(q)
        );
      }
      const _allVisits = loadVisits(), _allAddrs = loadAddresses();
      function _roadLastTime(r) {
        const ids = new Set(_allAddrs.filter(a => a.roadId === r.id).map(a => a.id));
        const rv = _allVisits.filter(v => ids.has(v.addressId));
        return rv.length ? Math.max(...rv.map(v => new Date(v.timestamp).getTime())) : 0;
      }
      if (state.roadSort === 'name_asc') {
        roads.sort((a,b) => a.name.localeCompare(b.name));
      } else if (state.roadSort === 'last_visited_asc') {
        roads.sort((a,b) => _roadLastTime(a) - _roadLastTime(b));
      } else {
        roads.sort((a,b) => _roadLastTime(b) - _roadLastTime(a));
      }

      const container = document.getElementById('roads-container');
      container.innerHTML = '';

      if (!roads.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        if (state.search) {
          empty.textContent = 'No roads match "' + state.search + '".';
        } else {
          empty.innerHTML = '<div>No roads yet.</div><div class="empty-state-hint">Click "+ Add Road" to add one.</div>';
        }
        container.appendChild(empty);
      } else {
        const grid = document.createElement('div');
        grid.className = state.viewMode === 'grid' ? 'card-grid' : 'list-view';
        roads.forEach(r => grid.appendChild(state.viewMode === 'grid' ? createRoadCard(r) : createRoadListItem(r)));
        container.appendChild(grid);
      }
    }

    /* ── Render Addresses ─────────────────────────────────── */
    function renderAddresses() {
      const road = loadRoads().find(r => r.id === state.currentRoadId);

      // Header
      const hdr = document.getElementById('addresses-view-header');
      hdr.innerHTML = '';
      const titleDiv = document.createElement('div');
      const titleEl = document.createElement('h2');
      titleEl.className = 'view-title'; titleEl.textContent = road ? road.name : '';
      if (road && road.postcode) {
        const sub = document.createElement('span');
        sub.className = 'view-title-sub'; sub.textContent = road.postcode;
        titleEl.appendChild(sub);
      }
      titleDiv.appendChild(titleEl);
      const addBtn = document.createElement('button');
      addBtn.className = 'btn btn-primary'; addBtn.textContent = '+ Add Address';
      addBtn.addEventListener('click', () => openAddAddressModal(state.currentRoadId));
      hdr.appendChild(titleDiv); hdr.appendChild(addBtn);

      // Number grid
      const container = document.getElementById('number-grid-container');
      container.innerHTML = '';
      const addresses = loadAddresses().filter(a => a.roadId === state.currentRoadId);

      if (!addresses.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<div>No addresses yet.</div><div class="empty-state-hint">Click "+ Add Address" to add house numbers.</div>';
        container.appendChild(empty);
        return;
      }

      const even = [], odd = [], other = [];
      addresses.forEach(a => {
        const n = parseAddressNumber(a.address);
        if (n === null) other.push(a);
        else if (n % 2 === 0) even.push(a);
        else odd.push(a);
      });
      const sortAddr = arr => arr.sort((a,b) => (parseAddressNumber(a.address) ?? 9999) - (parseAddressNumber(b.address) ?? 9999) || a.address.localeCompare(b.address));
      sortAddr(even); sortAddr(odd); sortAddr(other);

      const wrap = document.createElement('div');
      wrap.className = 'number-grid-wrap';
      [{ label:'Even', items:even }, { label:'Odd', items:odd }, { label:'Other', items:other }]
        .filter(s => s.items.length)
        .forEach(sec => {
          const row = document.createElement('div');
          row.className = 'number-row';
          const lbl = document.createElement('div');
          lbl.className = 'number-row-label'; lbl.textContent = sec.label;
          const tiles = document.createElement('div');
          tiles.className = 'number-tiles';
          sec.items.forEach(addr => {
            const lv = getLastVisit(addr.id);
            const tile = document.createElement('button');
            tile.className = 'number-tile' + (lv ? ' visited' : '');
            tile.textContent = addr.address;
            tile.title = lv ? 'Last: ' + lv.outcome : 'No visits yet';
            tile.addEventListener('click', () => openAddressPanel(addr.id));
            tiles.appendChild(tile);
          });
          row.appendChild(lbl); row.appendChild(tiles);
          wrap.appendChild(row);
        });
      container.appendChild(wrap);
    }

    /* ── Master Render ────────────────────────────────────── */
    function render() {
      updateBreadcrumb();
      const findLocEl = document.getElementById('view-find-location');

      // If user has no location yet, show the "Find your location" screen
      const locations = loadPlaces().filter(p => p.type === 'location');
      const showFindLocation = locations.length === 0 && state.view === 'places';

      findLocEl.classList.toggle('hidden', !showFindLocation);
      document.getElementById('view-places').classList.toggle('hidden',    state.view !== 'places' || showFindLocation);
      document.getElementById('view-roads').classList.toggle('hidden',     state.view !== 'roads');
      document.getElementById('view-addresses').classList.toggle('hidden', state.view !== 'addresses');

      if (showFindLocation)            renderFindLocation();
      else if (state.view === 'places')    renderPlaces();
      else if (state.view === 'roads') renderRoads();
      else                             renderAddresses();
    }

    /* ── Find Location Screen ────────────────────────────── */
    function renderFindLocation() {
      // (Logic handled by event listeners bound in bindStaticEvents)
      // Just refresh the requests list each time
      renderMyJoinRequests();
    }

    function renderMyJoinRequests() {
      const list = document.getElementById('join-requests-list');
      if (!list) return;
      list.innerHTML = '';
      // Pull requests from localStorage (keyed by rvt_join_requests)
      const reqs = JSON.parse(localStorage.getItem('rvt_join_requests') || '[]');
      if (!reqs.length) return;
      list.appendChild(el('div','find-location-sep','Your pending requests:'));
      reqs.forEach(req => {
        const row = el('div','join-result-card');
        row.style.marginBottom = '0.5rem';
        const info = el('div','join-result-info');
        info.appendChild(el('div','join-result-name', req.locationName));
        info.appendChild(el('div','join-result-addr', req.address || ''));
        const status = el('span','join-request-status ' + req.status, req.status);
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn btn-danger btn-sm';
        cancelBtn.textContent = 'Cancel';
        cancelBtn.addEventListener('click', () => {
          const all = JSON.parse(localStorage.getItem('rvt_join_requests') || '[]');
          localStorage.setItem('rvt_join_requests', JSON.stringify(all.filter(r => r.id !== req.id)));
          renderMyJoinRequests();
        });
        row.appendChild(info); row.appendChild(status);
        if (req.status === 'pending') row.appendChild(cancelBtn);
        list.appendChild(row);
      });
    }

    /* ── Modal System ─────────────────────────────────────── */
    function openModal(buildFn) {
      const c = document.getElementById('modal-content');
      c.innerHTML = '';
      buildFn(c);
      document.getElementById('modal-overlay').classList.remove('hidden');
      setTimeout(() => { const f = c.querySelector('input:not([type=hidden]),textarea,select'); if (f) f.focus(); }, 50);
    }
    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
      document.getElementById('modal-content').innerHTML = '';
    }

    /* ── Confirm Modal ────────────────────────────────────── */
    function openConfirm({ message, confirmLabel, onConfirm }) {
      openModal(c => {
        const title = el('h3','modal-title','Confirm');
        const msg = el('p','confirm-msg', message);
        const footer = document.createElement('div'); footer.className = 'modal-footer';
        const cancelBtn = btn('btn-ghost','Cancel', closeModal);
        const confirmBtn = btn('btn-danger', confirmLabel || 'Delete', () => { closeModal(); onConfirm(); });
        footer.appendChild(cancelBtn); footer.appendChild(confirmBtn);
        c.appendChild(title); c.appendChild(msg); c.appendChild(footer);
      });
    }

    /* ── DOM helpers ──────────────────────────────────────── */
    function el(tag, cls, text) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text !== undefined) e.textContent = text;
      return e;
    }
    function btn(cls, text, onclick) {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'btn ' + cls; b.textContent = text;
      b.addEventListener('click', onclick);
      return b;
    }
    function field(labelText, inputEl, errorText) {
      const wrap = el('div','modal-field');
      const lbl = el('label','modal-label', labelText);
      lbl.setAttribute('for', inputEl.id || '');
      wrap.appendChild(lbl); wrap.appendChild(inputEl);
      if (errorText) {
        const err = el('div','modal-error', errorText);
        if (inputEl.id) err.id = 'err-' + inputEl.id;
        wrap.appendChild(err);
      }
      return wrap;
    }
    function textInput(id, placeholder, value) {
      const i = document.createElement('input');
      i.className = 'modal-input'; i.type = 'text'; i.id = id;
      if (placeholder) i.placeholder = placeholder;
      if (value) i.value = value;
      return i;
    }

    /* ── New Place Modal ──────────────────────────────────── */
    function openNewPlaceModal(parentId, childType) {
      // Location modal: two-tab modal (Search OSM / Individual workspace)
      openModal(c => {
        c.appendChild(el('h3','modal-title','Add Location'));

        // Tabs
        const tabs = el('div','loc-tabs');
        const tabSearch = el('div','loc-tab active','🔍 Search');
        const tabIndiv  = el('div','loc-tab','👤 Individual');
        tabs.appendChild(tabSearch); tabs.appendChild(tabIndiv);
        c.appendChild(tabs);

        // ── Search panel ──────────────────────────────────────
        const searchPanel = document.createElement('div');

        const searchRow = el('div','osm-search-row');
        const searchIn  = textInput('osm-q','e.g. Al-Noor Mosque London','');
        searchIn.className = 'modal-input';
        const searchBtn = btn('btn-ghost','Search', doSearch);
        searchRow.appendChild(searchIn); searchRow.appendChild(searchBtn);
        searchPanel.appendChild(searchRow);

        const resultsBox = el('div','osm-results');
        const statusEl   = el('div','osm-status','Type a name and press Search.');
        resultsBox.appendChild(statusEl);
        searchPanel.appendChild(resultsBox);

        // Location type selector (shown after OSM result selected)
        const typeSection = document.createElement('div');
        typeSection.style.display = 'none';
        typeSection.appendChild(el('div','modal-label','Location Type'));
        const typeRow = el('div','loc-type-row');
        const typeMosque = btn('loc-type-btn active','🕌 Mosque', () => selectType('mosque'));
        const typeCustom = btn('loc-type-btn','✏️ Custom', () => selectType('custom'));
        typeRow.appendChild(typeMosque); typeRow.appendChild(typeCustom);
        typeSection.appendChild(typeRow);

        const customLabelWrap = document.createElement('div');
        customLabelWrap.style.display = 'none';
        const customLabelIn = textInput('loc-custom-label','e.g. Community Centre','');
        customLabelWrap.appendChild(field('Custom Label', customLabelIn, ''));
        typeSection.appendChild(customLabelWrap);

        // ── Country / City / Town (auto-filled from OSM, editable) ──
        const hierarchySection = document.createElement('div');
        hierarchySection.style.marginTop = '0.75rem';
        hierarchySection.appendChild(el('div','modal-label','Location Hierarchy'));
        const hierRow = el('div','modal-row');
        const countryIn = textInput('loc-country','Country e.g. UK','');
        const cityIn    = textInput('loc-city','City e.g. London','');
        const townIn    = textInput('loc-town','Town / Area e.g. Camden','');
        const townWrap  = el('div','modal-field'); townWrap.style.marginBottom = '0';
        townWrap.appendChild(el('label','modal-label','Town / Area')); townWrap.appendChild(townIn);
        hierRow.appendChild(field('Country', countryIn, ''));
        hierRow.appendChild(field('City', cityIn, ''));
        hierRow.style.marginBottom = '0.5rem';
        hierarchySection.appendChild(hierRow);
        hierarchySection.appendChild(townWrap);
        searchPanel.appendChild(typeSection);
        searchPanel.appendChild(hierarchySection);

        c.appendChild(searchPanel);

        // ── Individual panel ──────────────────────────────────
        const indivPanel = document.createElement('div');
        indivPanel.style.display = 'none';
        const indivNameIn = textInput('indiv-name','My workspace name','');
        indivPanel.appendChild(field('Workspace Name', indivNameIn, 'Name is required.'));

        // Country/City/Town for individual workspace
        const indivHierRow = el('div','modal-row');
        const indivCountryIn = textInput('indiv-country','Country e.g. UK','');
        const indivCityIn    = textInput('indiv-city','City e.g. London','');
        const indivTownWrap  = el('div','modal-field');
        const indivTownIn    = textInput('indiv-town','Town / Area e.g. Camden','');
        indivTownWrap.appendChild(el('label','modal-label','Town / Area')); indivTownWrap.appendChild(indivTownIn);
        indivHierRow.appendChild(field('Country', indivCountryIn, ''));
        indivHierRow.appendChild(field('City', indivCityIn, ''));
        indivPanel.appendChild(el('div','modal-label','Location Hierarchy'));
        indivPanel.appendChild(indivHierRow);
        indivPanel.appendChild(indivTownWrap);
        c.appendChild(indivPanel);

        // Footer
        const footer = document.createElement('div'); footer.className = 'modal-footer';
        const createBtn = btn('btn-primary','Create Location', onCreate);
        footer.appendChild(btn('btn-ghost','Cancel',closeModal));
        footer.appendChild(createBtn);
        c.appendChild(footer);

        // State
        let mode = 'search';
        let selectedOsm = null;
        let locType = 'mosque';

        function selectType(t) {
          locType = t;
          typeMosque.classList.toggle('active', t === 'mosque');
          typeCustom.classList.toggle('active', t === 'custom');
          customLabelWrap.style.display = t === 'custom' ? 'block' : 'none';
        }

        // Tab switching
        tabSearch.addEventListener('click', () => {
          mode = 'search';
          tabSearch.classList.add('active'); tabIndiv.classList.remove('active');
          searchPanel.style.display = ''; indivPanel.style.display = 'none';
        });
        tabIndiv.addEventListener('click', () => {
          mode = 'individual';
          tabIndiv.classList.add('active'); tabSearch.classList.remove('active');
          indivPanel.style.display = ''; searchPanel.style.display = 'none';
        });

        // Enter key triggers search
        searchIn.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doSearch(); } });

        async function doSearch() {
          const q = searchIn.value.trim();
          if (!q) return;
          statusEl.textContent = 'Searching…';
          resultsBox.innerHTML = ''; resultsBox.appendChild(statusEl);
          selectedOsm = null; typeSection.style.display = 'none';
          try {
            const res = await fetch(
              `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=6`,
              { headers: { 'Accept-Language': 'en' } }
            );
            const data = await res.json();
            resultsBox.innerHTML = '';
            if (!data.length) {
              resultsBox.appendChild(el('div','osm-status','No results found. Try a different search.'));
              return;
            }
            data.forEach(item => {
              const card = el('div','osm-result-card');
              card.appendChild(el('div','osm-result-name', item.display_name.split(',')[0]));
              card.appendChild(el('div','osm-result-addr', item.display_name));
              card.addEventListener('click', () => {
                resultsBox.querySelectorAll('.osm-result-card').forEach(x => x.classList.remove('selected'));
                card.classList.add('selected');
                const addr = item.address || {};
                selectedOsm = {
                  name:        item.display_name.split(',')[0],
                  address:     item.display_name,
                  lat:         parseFloat(item.lat),
                  lng:         parseFloat(item.lon),
                  osm_place_id: item.osm_type + item.osm_id,
                  country:     addr.country || '',
                  city:        addr.city || addr.town || addr.municipality || addr.county || '',
                  town:        addr.suburb || addr.neighbourhood || addr.quarter || addr.village || '',
                };
                // Auto-fill hierarchy fields from OSM address data
                countryIn.value = selectedOsm.country;
                cityIn.value    = selectedOsm.city;
                townIn.value    = selectedOsm.town;
                typeSection.style.display = 'block';
              });
              resultsBox.appendChild(card);
            });
          } catch(e) {
            resultsBox.innerHTML = '';
            resultsBox.appendChild(el('div','osm-status','Search failed. Check your connection.'));
          }
        }

        function onCreate() {
          if (mode === 'individual') {
            const name = indivNameIn.value.trim();
            if (!name) { alert('Please enter a workspace name.'); return; }
            const places = loadPlaces();
            if (places.find(p => p.type === 'location' && p.name.toLowerCase() === name.toLowerCase())) {
              alert('A location with this name already exists.'); return;
            }
            const newPlace = {
              id: uid(), parentId: null, type: 'location', name, locationType: 'individual',
              country: indivCountryIn.value.trim(),
              city:    indivCityIn.value.trim(),
              town:    indivTownIn.value.trim(),
            };
            places.push(newPlace); savePlaces(places);
            _syncCreatePlace(newPlace);
            closeModal(); render();
          } else {
            if (!selectedOsm) { alert('Please select a location from the search results.'); return; }
            const places = loadPlaces();
            if (places.find(p => p.osmPlaceId === selectedOsm.osm_place_id)) {
              alert('This location already exists. You can request to join it instead.'); closeModal(); return;
            }
            const customLabel = locType === 'custom' ? customLabelIn.value.trim() : '';
            const newPlace = {
              id:          uid(),
              parentId:    null,
              type:        'location',
              name:        selectedOsm.name,
              address:     selectedOsm.address,
              lat:         selectedOsm.lat,
              lng:         selectedOsm.lng,
              osmPlaceId:  selectedOsm.osm_place_id,
              locationType: locType,
              locationTypeLabel: customLabel || null,
              country:     countryIn.value.trim() || selectedOsm.country,
              city:        cityIn.value.trim()    || selectedOsm.city,
              town:        townIn.value.trim()    || selectedOsm.town,
            };
            places.push(newPlace); savePlaces(places);
            _syncCreatePlace(newPlace);
            closeModal(); render();
          }
        }
      });
    }

    /* ── Edit Place Modal ─────────────────────────────────── */
    function openEditPlaceModal(placeId) {
      const place = loadPlaces().find(p => p.id === placeId);
      if (!place) return;
      openModal(c => {
        const titleEl = el('h3','modal-title','Edit ' + TYPE_LABEL[place.type]);
        const nameIn = textInput('ep-name','', place.name);
        const nameField = field('Name', nameIn, 'Name is required.');
        const footer = document.createElement('div'); footer.className = 'modal-footer';
        footer.appendChild(btn('btn-ghost','Cancel',closeModal));
        footer.appendChild(btn('btn-primary','Save', () => {
          const name = nameIn.value.trim();
          if (!name) { document.getElementById('err-ep-name').classList.add('visible'); return; }
          const places = loadPlaces();
          const idx = places.findIndex(p => p.id === placeId);
          if (idx !== -1) { places[idx].name = name; savePlaces(places); _syncUpdatePlace(placeId, { name }); }
          // update breadcrumb stack if this place is in it
          state.placeStack.forEach(s => { if (s.id === placeId) s.name = name; });
          closeModal(); render();
        }));
        c.appendChild(titleEl); c.appendChild(nameField); c.appendChild(footer);
      });
    }

    /* ── Members storage helpers ─────────────────────────── */
    function loadMembers(locationId) {
      return JSON.parse(localStorage.getItem('rvt_members_' + locationId) || '[]');
    }
    function saveMembers(locationId, list) {
      localStorage.setItem('rvt_members_' + locationId, JSON.stringify(list));
    }

    /* ── Admin: Members Modal ────────────────────────────── */
    function openMembersModal(locationId) {
      const location = loadPlaces().find(p => p.id === locationId);
      openModal(c => {
        c.appendChild(el('h3','modal-title','👥 Members — ' + (location?.name || '')));

        // Combined member list: manually added + approved join requests
        function getAllMembers() {
          const manual = loadMembers(locationId);
          const approved = JSON.parse(localStorage.getItem('rvt_join_requests') || '[]')
            .filter(r => r.locationId === locationId && r.status === 'approved' && r.userName)
            .map(r => r.userName);
          return [...new Set([...manual, ...approved])];
        }

        const listEl = el('div','osm-results');
        listEl.style.maxHeight = '260px';

        function refreshList() {
          listEl.innerHTML = '';
          const all = getAllMembers();
          if (!all.length) {
            listEl.appendChild(el('div','osm-status','No members yet. Add one below or approve join requests.'));
            return;
          }
          all.forEach(name => {
            const row = el('div','join-result-card');
            row.style.marginBottom = '0.4rem';
            const info = el('div','join-result-info');
            info.appendChild(el('div','join-result-name', name));
            const removeBtn = btn('btn-danger btn-sm','Remove', () => {
              const manual = loadMembers(locationId).filter(m => m !== name);
              saveMembers(locationId, manual);
              // Also mark join request as removed
              const reqs = JSON.parse(localStorage.getItem('rvt_join_requests') || '[]');
              const idx = reqs.findIndex(r => r.locationId === locationId && r.userName === name);
              if (idx !== -1) { reqs[idx].status = 'removed'; localStorage.setItem('rvt_join_requests', JSON.stringify(reqs)); }
              refreshList();
            });
            row.appendChild(info); row.appendChild(removeBtn);
            listEl.appendChild(row);
          });
        }
        refreshList();
        c.appendChild(listEl);

        // ── Invite by email + shareable link ──
        c.appendChild(el('div','modal-label','Invite Someone'));

        // Build join token from location data
        const locSnapshot = {
          id:                location.id,
          name:              location.name,
          locationType:      location.locationType || 'custom',
          locationTypeLabel: location.locationTypeLabel || null,
          country:           location.country || '',
          city:              location.city    || '',
          town:              location.town    || '',
          address:           location.address || '',
        };
        const joinToken  = btoa(unescape(encodeURIComponent(JSON.stringify(locSnapshot))));
        const loginBase  = window.location.href.replace('index-v2.html', 'login-v2.html').split('?')[0];
        const joinUrl    = loginBase + '?join=' + joinToken;

        const inviteRow = el('div','settings-add-row');
        const emailIn   = document.createElement('input');
        emailIn.className = 'modal-input'; emailIn.type = 'email';
        emailIn.placeholder = 'Their email (optional — for your records)';

        const getBtn = btn('btn-primary btn-sm','Get Invite Link', () => {
          const email = emailIn.value.trim();
          if (email) {
            const manual = loadMembers(locationId);
            if (!getAllMembers().includes(email)) { manual.push(email); saveMembers(locationId, manual); refreshList(); }
          }
          linkBox.classList.remove('hidden');
          linkIn.focus(); linkIn.select();
        });
        inviteRow.appendChild(emailIn); inviteRow.appendChild(getBtn);
        c.appendChild(inviteRow);

        // Link box (hidden until "Get Invite Link" clicked)
        const linkBox = el('div','hidden');
        linkBox.style.marginTop = '0.65rem';
        linkBox.appendChild(el('div','modal-label','Share this link — they sign up, they join automatically'));
        const linkRow = el('div','settings-add-row');
        const linkIn  = document.createElement('input');
        linkIn.className = 'modal-input'; linkIn.type = 'text';
        linkIn.value = joinUrl; linkIn.readOnly = true;
        linkIn.style.fontSize = '0.72rem';
        const copyBtn = btn('btn-ghost btn-sm','📋 Copy', () => {
          navigator.clipboard.writeText(joinUrl)
            .then(() => { copyBtn.textContent = '✓ Copied!'; setTimeout(() => { copyBtn.textContent = '📋 Copy'; }, 2000); })
            .catch(() => { linkIn.select(); document.execCommand('copy'); copyBtn.textContent = '✓ Copied!'; setTimeout(() => { copyBtn.textContent = '📋 Copy'; }, 2000); });
        });
        linkRow.appendChild(linkIn); linkRow.appendChild(copyBtn);
        linkBox.appendChild(linkRow);
        c.appendChild(linkBox);

        const footer = el('div','modal-footer');
        footer.appendChild(btn('btn-ghost','Close', closeModal));
        c.appendChild(footer);
      });
    }

    /* ── Admin: Join Requests Modal ──────────────────────── */
    function openJoinRequestsModal(locationId) {
      const location = loadPlaces().find(p => p.id === locationId);
      openModal(c => {
        c.appendChild(el('h3','modal-title','📋 Join Requests — ' + (location?.name || '')));

        const pending = JSON.parse(localStorage.getItem('rvt_join_requests') || '[]')
          .filter(r => r.locationId === locationId && r.status === 'pending');

        if (!pending.length) {
          c.appendChild(el('div','osm-status','No pending requests.'));
        } else {
          const list = el('div','osm-results');
          list.style.maxHeight = '320px';
          pending.forEach(r => {
            const row = el('div','join-result-card');
            row.style.marginBottom = '0.5rem';
            const info = el('div','join-result-info');
            info.appendChild(el('div','join-result-name', r.userName || 'User'));
            info.appendChild(el('div','join-result-addr', 'Requested ' + new Date(r.createdAt).toLocaleDateString()));
            const approveBtn = btn('btn-primary btn-sm','Approve', () => {
              updateJoinRequest(r.id, 'approved');
              closeModal(); render();
            });
            const rejectBtn = btn('btn-danger btn-sm','Reject', () => {
              updateJoinRequest(r.id, 'rejected');
              closeModal(); render();
            });
            const btnWrap = el('div','card-actions');
            btnWrap.appendChild(approveBtn); btnWrap.appendChild(rejectBtn);
            row.appendChild(info); row.appendChild(btnWrap);
            list.appendChild(row);
          });
          c.appendChild(list);
        }

        const footer = el('div','modal-footer');
        footer.appendChild(btn('btn-ghost','Close', closeModal));
        c.appendChild(footer);
      });
    }

    function updateJoinRequest(id, status) {
      const all = JSON.parse(localStorage.getItem('rvt_join_requests') || '[]');
      const idx = all.findIndex(r => r.id === id);
      if (idx !== -1) {
        all[idx].status = status;
        all[idx].reviewedAt = new Date().toISOString();
        localStorage.setItem('rvt_join_requests', JSON.stringify(all));
      }
    }

    /* ── New Road Modal ───────────────────────────────────── */
    function openNewRoadModal(locationId) {
      openModal(c => {
        const titleEl = el('h3','modal-title','New Road');
        const nameIn = textInput('nr-name','e.g. Oak Street','');
        const nameField = field('Road Name', nameIn, 'Road name is required.');
        const footer = document.createElement('div'); footer.className = 'modal-footer';

        footer.appendChild(btn('btn-ghost','Cancel',closeModal));
        footer.appendChild(btn('btn-primary','Create Road', () => {
          const name = nameIn.value.trim();
          if (!name) { document.getElementById('err-nr-name').classList.add('visible'); return; }
          const road = { id:uid(), name, locationId: locationId || null, tags:[], createdAt:new Date().toISOString() };
          const roads = loadRoads(); roads.push(road); saveRoads(roads);
          _syncCreateRoad(road);
          closeModal(); render();
        }));

        c.appendChild(titleEl); c.appendChild(nameField);
        c.appendChild(footer);
      });
    }

    /* ── Assign Tags Modal (quick access from card) ──────── */
    function openTagAssignModal(roadId) {
      const road = loadRoads().find(r => r.id === roadId);
      if (!road) return;
      const locationTags = loadTags(road.locationId);
      if (!locationTags.length) return;
      openModal(c => {
        c.appendChild(el('h3','modal-title','Tags — ' + road.name));
        const selectedTags = new Set(road.tags || []);
        const chipRow = document.createElement('div');
        chipRow.className = 'tag-toggle-row';
        chipRow.style.marginBottom = '16px';
        locationTags.forEach(tag => {
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'tag-toggle-chip' + (selectedTags.has(tag.id) ? ' active' : '');
          chip.textContent = tag.name;
          if (selectedTags.has(tag.id)) chip.style.cssText = `background:${tag.color}22;border-color:${tag.color};color:${tag.color};`;
          chip.addEventListener('click', () => {
            if (selectedTags.has(tag.id)) {
              selectedTags.delete(tag.id); chip.classList.remove('active'); chip.style.cssText = '';
            } else {
              selectedTags.add(tag.id); chip.classList.add('active');
              chip.style.cssText = `background:${tag.color}22;border-color:${tag.color};color:${tag.color};`;
            }
          });
          chipRow.appendChild(chip);
        });
        const footer = document.createElement('div'); footer.className = 'modal-footer';
        footer.appendChild(btn('btn-ghost','Cancel', closeModal));
        footer.appendChild(btn('btn-primary','Save', () => {
          const roads = loadRoads();
          const idx = roads.findIndex(r => r.id === roadId);
          if (idx !== -1) { roads[idx].tags = [...selectedTags]; saveRoads(roads); _syncTagAssignments(roadId, [...selectedTags]); }
          closeModal(); render();
        }));
        c.appendChild(chipRow); c.appendChild(footer);
      });
    }

    /* ── Manage Tags Modal ────────────────────────────────── */
    const TAG_COLORS = ['#C9A84C','#50c878','#4a90d9','#e05c5c','#9b59b6','#e67e22'];

    function openManageTagsModal(locationId) {
      openModal(c => {
        const titleEl = el('h3','modal-title','Manage Tags');
        c.appendChild(titleEl);

        function renderTagList() {
          let listEl = c.querySelector('.manage-tags-list');
          if (listEl) listEl.remove();
          listEl = document.createElement('div');
          listEl.className = 'manage-tags-list';
          const tags = loadTags(locationId);
          if (!tags.length) {
            const empty = document.createElement('div');
            empty.style.cssText = 'color:var(--text-muted);font-size:0.8rem;margin-bottom:8px;';
            empty.textContent = 'No tags yet. Create one below.';
            listEl.appendChild(empty);
          }
          tags.forEach(tag => {
            const row = document.createElement('div');
            row.className = 'manage-tag-row';
            const swatch = document.createElement('span');
            swatch.className = 'manage-tag-swatch';
            swatch.style.background = tag.color;
            const nameEl = document.createElement('span');
            nameEl.style.flex = '1'; nameEl.textContent = tag.name;
            const delBtn = document.createElement('button');
            delBtn.className = 'icon-btn del'; delBtn.textContent = '🗑';
            delBtn.title = 'Delete tag';
            delBtn.addEventListener('click', () => {
              const updated = loadTags(locationId).filter(t => t.id !== tag.id);
              saveTags(locationId, updated);
              _syncDeleteTag(tag.id);
              // Remove tag from all roads in this location
              const roads = loadRoads();
              roads.filter(r => r.locationId === locationId).forEach(r => {
                if (r.tags) r.tags = r.tags.filter(tid => tid !== tag.id);
              });
              saveRoads(roads);
              renderTagList();
            });
            row.appendChild(swatch); row.appendChild(nameEl); row.appendChild(delBtn);
            listEl.appendChild(row);
          });
          c.insertBefore(listEl, c.querySelector('.modal-footer'));
        }

        // New tag form
        const newTagSection = document.createElement('div');
        newTagSection.className = 'form-group';
        const newTagLbl = document.createElement('label');
        newTagLbl.textContent = 'New Tag Name';
        const newTagIn = document.createElement('input');
        newTagIn.type = 'text'; newTagIn.className = 'modal-input'; newTagIn.placeholder = 'e.g. Priority, Follow Up…';

        let selectedColor = TAG_COLORS[0];
        const colorRow = document.createElement('div');
        colorRow.className = 'tag-color-options';
        TAG_COLORS.forEach((col, i) => {
          const dot = document.createElement('button');
          dot.type = 'button';
          dot.className = 'tag-color-opt' + (i === 0 ? ' selected' : '');
          dot.style.background = col;
          dot.title = col;
          dot.addEventListener('click', () => {
            selectedColor = col;
            colorRow.querySelectorAll('.tag-color-opt').forEach(d => d.classList.remove('selected'));
            dot.classList.add('selected');
          });
          colorRow.appendChild(dot);
        });

        newTagSection.appendChild(newTagLbl); newTagSection.appendChild(newTagIn); newTagSection.appendChild(colorRow);

        const footer = document.createElement('div'); footer.className = 'modal-footer';
        footer.appendChild(btn('btn-ghost','Close', closeModal));
        footer.appendChild(btn('btn-primary','Add Tag', () => {
          const name = newTagIn.value.trim();
          if (!name) return;
          const newTag = { id: uid(), name, color: selectedColor };
          const tags = loadTags(locationId);
          tags.push(newTag);
          saveTags(locationId, tags);
          _syncCreateTag(newTag, locationId);
          newTagIn.value = '';
          renderTagList();
          render();
        }));

        c.appendChild(newTagSection); c.appendChild(footer);
        renderTagList();
      });
    }

    /* ── Edit Road Modal ──────────────────────────────────── */
    function openEditRoadModal(roadId) {
      const road = loadRoads().find(r => r.id === roadId);
      if (!road) return;
      openModal(c => {
        const titleEl = el('h3','modal-title','Edit Road');
        const nameIn = textInput('er-name','',road.name);
        const nameField = field('Road Name', nameIn, 'Name is required.');
        const pcIn = textInput('er-postcode','e.g. SW1A 1AA', road.postcode || '');
        const pcField = field('Postcode', pcIn, '');

        // Tags section
        const locationTags = loadTags(road.locationId);
        const selectedTags = new Set(road.tags || []);
        let tagSection = null;
        if (locationTags.length) {
          tagSection = document.createElement('div');
          tagSection.className = 'form-group';
          const tagLbl = document.createElement('label');
          tagLbl.textContent = 'Tags';
          const chipRow = document.createElement('div');
          chipRow.className = 'tag-toggle-row';
          locationTags.forEach(tag => {
            const chip = document.createElement('button');
            chip.type = 'button';
            chip.className = 'tag-toggle-chip' + (selectedTags.has(tag.id) ? ' active' : '');
            chip.textContent = tag.name;
            if (selectedTags.has(tag.id)) chip.style.cssText = `background:${tag.color}22;border-color:${tag.color};color:${tag.color};`;
            chip.addEventListener('click', () => {
              if (selectedTags.has(tag.id)) {
                selectedTags.delete(tag.id);
                chip.classList.remove('active');
                chip.style.cssText = '';
              } else {
                selectedTags.add(tag.id);
                chip.classList.add('active');
                chip.style.cssText = `background:${tag.color}22;border-color:${tag.color};color:${tag.color};`;
              }
            });
            chipRow.appendChild(chip);
          });
          tagSection.appendChild(tagLbl); tagSection.appendChild(chipRow);
        }

        const footer = document.createElement('div'); footer.className = 'modal-footer';
        footer.appendChild(btn('btn-ghost','Cancel',closeModal));
        footer.appendChild(btn('btn-primary','Save', () => {
          const name = nameIn.value.trim();
          if (!name) { document.getElementById('err-er-name').classList.add('visible'); return; }
          const roads = loadRoads();
          const idx = roads.findIndex(r => r.id === roadId);
          if (idx !== -1) {
            roads[idx].name = name;
            roads[idx].postcode = pcIn.value.trim();
            roads[idx].tags = [...selectedTags];
            saveRoads(roads);
            _syncUpdateRoad(roadId, { name, postcode: pcIn.value.trim() || null });
            _syncTagAssignments(roadId, [...selectedTags]);
          }
          state.placeStack.forEach(s => { if (s.id === roadId) s.name = name; });
          closeModal(); render();
        }));
        c.appendChild(titleEl); c.appendChild(nameField); c.appendChild(pcField);

        byWrap.appendChild(el('label','modal-label','Entered By'));

        // Auto-fill: auth user > saved setting > empty
        const authUser = window._rvtAuthUser;
        const defaultName = (authUser && (authUser.name || authUser.email)) || settings.currentUser || '';

        // Build member list for dropdown: auth user + approved members for current location
        const memberNames = [];
        if (authUser && (authUser.name || authUser.email)) memberNames.push(authUser.name || authUser.email);

        const approvedReqs = JSON.parse(localStorage.getItem('rvt_join_requests') || '[]')
          .filter(r => r.locationId === state.currentLocationId && r.status === 'approved' && r.userName);
        approvedReqs.forEach(r => { if (!memberNames.includes(r.userName)) memberNames.push(r.userName); });

        let byIn;

          byIn = document.createElement('select');
          byIn.className = 'modal-input';
          memberNames.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name; opt.textContent = name;

          });

          byIn.appendChild(otherOpt);

          byIn = textInput('','Your name', defaultName);

    function buildHistoryList(addressId) {

    function showImportFeedback(msg, type) {
      const el2 = document.getElementById('import-feedback');
      el2.textContent = msg; el2.className = 'import-feedback ' + type;
      el2.classList.remove('hidden');
      setTimeout(() => el2.classList.add('hidden'), 5000);
    }

    function importCSV(file) {
      const reader = new FileReader();
      reader.onload = e => {
        const lines = e.target.result.split(/\r?\n/).map(l => l.trim()).filter(l => l);
        if (!lines.length) { showImportFeedback('File is empty.','error'); return; }
        const first = lines[0].toLowerCase();
        const hasHeader = first.startsWith('road') || first.startsWith('name');
        const dataLines = hasHeader ? lines.slice(1) : lines;
        const headerCols = hasHeader ? lines[0].split(',').map(c => c.trim().toLowerCase()) : [];
        const hasPostcode = headerCols.length >= 3 && headerCols[1].includes('post');

        const roads = loadRoads(), addresses = loadAddresses();
        let newRoads = 0, newAddresses = 0;

        const currentLocId = state.currentLocationId || null;
        dataLines.forEach(line => {
          const parts = line.split(',');
          const roadName = (parts[0]||'').trim();
          let postcode = '', addrValue = '';
          if (hasPostcode) { postcode = (parts[1]||'').trim(); addrValue = parts.slice(2).join(',').trim(); }
          else { addrValue = parts.slice(1).join(',').trim(); }
          if (!roadName || !addrValue) return;

          let road = roads.find(r => r.name.toLowerCase() === roadName.toLowerCase() && r.locationId === currentLocId);
          if (!road) {
            road = {id:uid(),name:roadName,postcode,locationId:currentLocId,tags:[],createdAt:new Date().toISOString()};
            roads.push(road); _syncCreateRoad(road); newRoads++;
          }
          if (!addresses.some(a => a.roadId === road.id && a.address.toLowerCase() === addrValue.toLowerCase())) {
            const newAddr = {id:uid(),roadId:road.id,address:addrValue};
            addresses.push(newAddr); _syncCreateAddress(newAddr); newAddresses++;
          }
        });

        saveRoads(roads); saveAddresses(addresses); render();
        showImportFeedback(`Imported ${newRoads} road${newRoads!==1?'s':''} and ${newAddresses} address${newAddresses!==1?'es':''}.`,'success');
      };
      reader.onerror = () => showImportFeedback('Could not read file.','error');
      reader.readAsText(file);
    }

      document.getElementById('btn-settings').addEventListener('click', openSettingsModal);

      document.getElementById('btn-theme-toggle').addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'dark';

      document.getElementById('global-search').addEventListener('input', e => {

      document.getElementById('btn-view-grid').addEventListener('click', () => {

      document.getElementById('csv-file-input').addEventListener('change', function () {

      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

      // ── Find Location: Search ─────────────────────────────
      const joinSearchBtn = document.getElementById('join-search-btn');
      const joinSearchIn  = document.getElementById('join-search-input');
      if (joinSearchBtn) {
        async function doJoinSearch() {
          const q = joinSearchIn.value.trim();
          if (!q) return;
          const resultsEl = document.getElementById('join-results');
          resultsEl.innerHTML = '<div class="osm-status">Searching…</div>';

          // First: search existing locations in localStorage
          const existing = loadPlaces().filter(p =>
            p.type === 'location' && p.name.toLowerCase().includes(q.toLowerCase())
          );

          // Then: search OSM
          let osmResults = [];
          try {
            const res = await fetch(
              `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=5`,
              { headers: { 'Accept-Language': 'en' } }
            );
            osmResults = await res.json();
          } catch(e) {}

          resultsEl.innerHTML = '';
          if (!existing.length && !osmResults.length) {
            resultsEl.innerHTML = '<div class="osm-status">No results found.</div>';
            return;
          }

          // Show existing DB locations first
          existing.forEach(loc => {
            const row = el('div','join-result-card');
            row.style.marginBottom = '0.5rem';
            const info = el('div','join-result-info');
            info.appendChild(el('div','join-result-name', loc.name));
            if (loc.address) info.appendChild(el('div','join-result-addr', loc.address));
            const reqBtn = btn('btn-primary btn-sm','Request Access', () => {
              const reqs = JSON.parse(localStorage.getItem('rvt_join_requests') || '[]');
              if (reqs.find(r => r.locationId === loc.id)) { alert('You already sent a request for this location.'); return; }
              const authU = window._rvtAuthUser;
              reqs.push({ id:uid(), locationId:loc.id, locationName:loc.name, address:loc.address||'', status:'pending', createdAt:new Date().toISOString(), userName: (authU && (authU.name || authU.email)) || '' });
              localStorage.setItem('rvt_join_requests', JSON.stringify(reqs));
              alert('Request sent! The admin will review it shortly.');
              renderMyJoinRequests();
            });
            row.appendChild(info); row.appendChild(reqBtn);
            resultsEl.appendChild(row);
          });

          // Show OSM results (not already in DB)
          const existingOsmIds = new Set(loadPlaces().map(p => p.osmPlaceId).filter(Boolean));
          osmResults.filter(r => !existingOsmIds.has(r.osm_type + r.osm_id)).forEach(item => {
            const row = el('div','join-result-card');
            row.style.marginBottom = '0.5rem';
            const info = el('div','join-result-info');
            info.appendChild(el('div','join-result-name', item.display_name.split(',')[0]));
            info.appendChild(el('div','join-result-addr', item.display_name));
            const addBtn2 = btn('btn-ghost btn-sm','Add & Join', () => {
              // Add as new location and auto-join
              const places = loadPlaces();
              const newPlace = {
                id: uid(), parentId: null, type:'location', name: item.display_name.split(',')[0],
                address: item.display_name, lat: parseFloat(item.lat), lng: parseFloat(item.lon),
                osmPlaceId: item.osm_type + item.osm_id, locationType:'mosque',
              };
              places.push(newPlace); savePlaces(places);
              _syncCreatePlace(newPlace);
              alert('Location added! You are now the owner.');
              render();
            });
            row.appendChild(info); row.appendChild(addBtn2);
            resultsEl.appendChild(row);
          });
        }

        joinSearchBtn.addEventListener('click', doJoinSearch);
        joinSearchIn.addEventListener('keydown', e => { if (e.key === 'Enter') doJoinSearch(); });
      }

      // ── Find Location: Create own workspace ───────────────
      const createOwnBtn = document.getElementById('btn-create-own');
      if (createOwnBtn) {
        createOwnBtn.addEventListener('click', () => {
          const name = prompt('Enter a name for your private workspace:');
          if (!name || !name.trim()) return;
          const places = loadPlaces();
          places.push({ id:uid(), parentId:null, type:'location', name:name.trim(), locationType:'individual' });
          savePlaces(places); render();
        });
      }
    }

    /* ── Leaflet Road Location ───────────────────────────── */
    let _leafletMap = null, _leafletMarker = null, _mapRoadId = null, _pendingLatLng = null;

    function setMapPin(lat, lng) {
      _pendingLatLng = { lat, lng };
      const ll = L.latLng(lat, lng);
      if (_leafletMarker) _leafletMarker.setLatLng(ll);
      else _leafletMarker = L.marker(ll).addTo(_leafletMap);
      _leafletMap.setView(ll, 15);
      document.getElementById('map-coords').textContent =
        `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`;
      reverseGeocode(lat, lng);
    }

    async function reverseGeocode(lat, lng) {
      const hierEl = document.getElementById('map-hierarchy');
      hierEl.textContent = 'Looking up location…';
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1`,
          { headers: { 'Accept-Language': 'en' } }
        );
        const data = await res.json();
        const a = data.address || {};
        const country = a.country || '';
        const city    = a.city || a.town || a.municipality || a.county || '';
        const town    = a.suburb || a.neighbourhood || a.quarter || a.village || '';
        const parts   = [country, city, town].filter(Boolean);
        hierEl.textContent = parts.length ? '📍 ' + parts.join(' › ') : '';
        // Store hierarchy on pending pin for saving with the road
        _pendingLatLng.country = country;
        _pendingLatLng.city    = city;
        _pendingLatLng.town    = town;
      } catch(e) {
        hierEl.textContent = '';
      }
    }

    function openMapModal(roadId) {
      _mapRoadId = roadId;
      const road  = loadRoads().find(r => r.id === roadId);
      _pendingLatLng = road?.lat && road?.lng ? { lat: road.lat, lng: road.lng } : null;

      document.getElementById('map-modal').classList.remove('hidden');
      document.getElementById('map-hierarchy').textContent = '';

      // Init map once
      if (!_leafletMap) {
        _leafletMap = L.map('leaflet-map').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
          subdomains: 'abcd',
          maxZoom: 20,
        }).addTo(_leafletMap);
        _leafletMap.on('click', e => {
          setMapPin(e.latlng.lat, e.latlng.lng);
        });
      }

      // Place existing pin or centre on GPS
      if (_pendingLatLng) {
        const ll = L.latLng(_pendingLatLng.lat, _pendingLatLng.lng);
        if (_leafletMarker) _leafletMarker.setLatLng(ll);
        else _leafletMarker = L.marker(ll).addTo(_leafletMap);
        _leafletMap.setView(ll, 15);
        document.getElementById('map-coords').textContent =
          `Lat: ${_pendingLatLng.lat.toFixed(6)}, Lng: ${_pendingLatLng.lng.toFixed(6)}`;
        reverseGeocode(_pendingLatLng.lat, _pendingLatLng.lng);
      } else {
        if (_leafletMarker) { _leafletMarker.remove(); _leafletMarker = null; }
        document.getElementById('map-coords').textContent = 'Click the map to pin a location';
        // Centre on GPS silently
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(pos => {
            _leafletMap.setView([pos.coords.latitude, pos.coords.longitude], 14);
          });
        }
      }
      setTimeout(() => _leafletMap.invalidateSize(), 50);
    }

    function closeMapModal() {
      document.getElementById('map-modal').classList.add('hidden');
    }

    function saveMapLocation() {
      if (!_mapRoadId || !_pendingLatLng) { closeMapModal(); return; }
      const roads = loadRoads();
      const idx = roads.findIndex(r => r.id === _mapRoadId);
      if (idx !== -1) {
        roads[idx].lat     = _pendingLatLng.lat;
        roads[idx].lng     = _pendingLatLng.lng;
        roads[idx].country = _pendingLatLng.country || roads[idx].country || '';
        roads[idx].city    = _pendingLatLng.city    || roads[idx].city    || '';
        roads[idx].town    = _pendingLatLng.town    || roads[idx].town    || '';
        saveRoads(roads);
        _syncUpdateRoad(_mapRoadId, {
          lat: roads[idx].lat, lng: roads[idx].lng,
          country: roads[idx].country, city: roads[idx].city, town: roads[idx].town,
        });
      }
      closeMapModal(); render();
    }

    /* ── Init ─────────────────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
      bindStaticEvents();

      // Map modal events
      document.getElementById('map-modal-close').addEventListener('click', closeMapModal);
      document.getElementById('map-save-btn').addEventListener('click', saveMapLocation);
      document.getElementById('map-clear-btn').addEventListener('click', () => {
        _pendingLatLng = null;
        if (_leafletMarker) { _leafletMarker.remove(); _leafletMarker = null; }
        document.getElementById('map-coords').textContent = 'Click the map to pin a location';
        document.getElementById('map-hierarchy').textContent = '';
      });
      document.getElementById('map-gps-btn').addEventListener('click', () => {
        if (!navigator.geolocation) { alert('Geolocation is not supported by your browser.'); return; }
        const btn = document.getElementById('map-gps-btn');
        btn.textContent = '⏳ Getting location…';
        btn.disabled = true;
        navigator.geolocation.getCurrentPosition(
          pos => {
            btn.textContent = '📍 Use My GPS'; btn.disabled = false;
            setMapPin(pos.coords.latitude, pos.coords.longitude);
          },
          () => { btn.textContent = '📍 Use My GPS'; btn.disabled = false; alert('Could not get your location. Please allow location access.'); }
        );
      });

      // render() is called by initCache() in the module script after data loads
    });

    // ── Expose to module script ────────────────────────────────
    window._rvtCache      = _cache;
    window._rvtRender     = render;
    window._rvtShowToast  = _showToast;

    // ── Join invite processor (Phase 7 — localStorage invite, kept for backwards compat) ──
    window._rvtProcessJoin = function(token) {
      try {
        const locData = JSON.parse(decodeURIComponent(escape(atob(token))));
        const places = loadPlaces();
        if (!places.find(p => p.id === locData.id)) {
          const newPlace = { ...locData, type: 'location', joinedAt: new Date().toISOString() };
          places.push(newPlace); savePlaces(places);
          render();
        }
        localStorage.removeItem('rvt_pending_join');
        _showToast('✓ Joined "' + locData.name + '"!');
      } catch(e) {
        localStorage.removeItem('rvt_pending_join');
      }
    };

  }());
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"
          integrity="sha384-rwykjmWNwVxboyFmvK9OXN0wj9hnMHA2aAHtits54DuACyCq0M2PrSNxhRb+hvXT"
          crossorigin="anonymous"></script>
  <script type="module">
    import { Auth, db, Locations, Roads, Tags, TagAssignments, Settings } from './supabase-client-v2.js';

    // ── Auth guard ───────────────────────────────────────────
    const { data: { session } } = await db.auth.getSession();
    if (!session) {
      window.location.replace('login-v2.html');
    } else {
      const email    = session.user.email || '';
      const fullName = session.user.user_metadata?.full_name || '';
      document.getElementById('user-email').textContent = fullName || email;
      window._rvtAuthUser = { name: fullName, email };

      // Expose db + userId so IIFE sync helpers can use them
      window._rvtDb     = db;
      window._rvtUserId = session.user.id;

      // Load all data then render
      await initCache();

      // Process pending join invite (Phase 7 backwards compat)
      const pendingJoin = localStorage.getItem('rvt_pending_join');
      if (pendingJoin && typeof window._rvtProcessJoin === 'function') {
        window._rvtProcessJoin(pendingJoin);
      }
    }

    // ── Sign out ─────────────────────────────────────────────
    document.getElementById('btn-signout').addEventListener('click', async () => {
      await Auth.signOut();
      window.location.replace('login-v2.html');
    });

    // ── Session expiry ───────────────────────────────────────
    db.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') window.location.replace('login-v2.html');
    });

    // ── DB row → app object mappers ──────────────────────────
    function mapDbPlace(r) {
      return {
        id: r.id, name: r.name, type: r.type,
        locationType:      r.location_type,
        locationTypeLabel: r.location_type_label,
        country:  r.country  || '',
        city:     r.city     || '',
        town:     r.town     || '',
        lat:      r.lat,      lng: r.lng,
        osmPlaceId: r.osm_place_id,
        address:  r.address  || '',
        parentId: r.parent_id,
        orgId:    r.org_id,
        ownerId:  r.owner_id,
        createdAt: r.created_at,
      };
    }
    function mapDbRoad(r) {
      return {
        id: r.id, name: r.name,
        postcode:   r.postcode  || '',
        locationId: r.location_id,
        lat: r.lat, lng: r.lng,
        country: r.country || '', city: r.city || '', town: r.town || '',
        createdAt: r.created_at,
        tags: [],  // populated from tag assignments below
      };
    }
    function mapDbAddress(r) {
      return { id: r.id, roadId: r.road_id, address: r.address };
    }
    function mapDbVisit(r) {
      // Merge outcome + notes (stored separately in DB, combined in UI)
      const outcomeText = [r.outcome, r.notes].filter(Boolean).join(' — ');
      return {
        id: r.id, addressId: r.address_id,
        outcome:   outcomeText,
        timestamp: r.visited_at,
        enteredBy: r.entered_by_name || '',
      };
    }
    function mapDbTag(r) {
      return { id: r.id, locationId: r.location_id, name: r.name, color: r.color };
    }

    // ── Cache initialiser ────────────────────────────────────
    async function initCache() {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) overlay.style.display = 'flex';

      try {
        const cache = window._rvtCache;

        // 1. Locations
        const dbLocs = await Locations.getMyLocations();
        cache.places = dbLocs.map(mapDbPlace);
        const locIds = dbLocs.map(l => l.id);

        if (locIds.length) {
          // 2. Roads (parallel per location)
          const roadArrays = await Promise.all(locIds.map(id => Roads.getByLocation(id)));
          const allDbRoads = roadArrays.flat();
          cache.roads = allDbRoads.map(mapDbRoad);
          const roadIds = allDbRoads.map(r => r.id);

          if (roadIds.length) {
            // 3. Addresses
            const { data: addrData } = await db
              .from('addresses').select('*')
              .in('road_id', roadIds).is('deleted_at', null);
            cache.addresses = (addrData || []).map(mapDbAddress);

            // 4. Visits (need address IDs first)
            const addrIds = (addrData || []).map(a => a.id);
            if (addrIds.length) {
              const { data: visitData } = await db
                .from('visits').select('*')
                .in('address_id', addrIds)
                .is('deleted_at', null)
                .order('visited_at', { ascending: false });
              cache.visits = (visitData || []).map(mapDbVisit);
            }
          }

          // 4. Tags + assignments (parallel per location)
          const [tagArrays, assignArrays] = await Promise.all([
            Promise.all(locIds.map(id => Tags.list(id))),
            Promise.all(locIds.map(id => TagAssignments.getByLocation(id))),
          ]);

          cache.tags = {};
          tagArrays.forEach((tags, i) => {
            cache.tags[locIds[i]] = tags.map(mapDbTag);
          });

          const assignByRoad = {};
          assignArrays.flat().forEach(a => {
            if (!assignByRoad[a.road_id]) assignByRoad[a.road_id] = [];
            assignByRoad[a.road_id].push(a.tag_id);
          });
          cache.roads.forEach(r => { r.tags = assignByRoad[r.id] || []; });
        }

        // 5. Settings (display name + outcomes from profiles.preferences)
        const settingsData = await Settings.get();
        const prefs = settingsData?.preferences || {};
        if (prefs.outcomes?.length) cache.outcomes = prefs.outcomes;
        cache.settings = {
          currentUser: settingsData?.full_name || window._rvtAuthUser?.name || '',
        };

      } catch (e) {
        console.error('initCache failed:', e);
        if (window._rvtShowToast) window._rvtShowToast('Could not load data — please refresh.', true);
      }

      if (overlay) overlay.style.display = 'none';
      if (window._rvtRender) window._rvtRender();
    }
  </script>

  <!-- Loading overlay — shown during initCache, hidden once data is ready -->
  <div id="loading-overlay" style="display:none;position:fixed;inset:0;background:rgba(10,10,10,0.93);flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
    <div style="color:var(--gold);font-size:1.05rem;margin-bottom:1.1rem;font-family:Georgia,serif;letter-spacing:0.05em;">Loading your data…</div>
    <div style="width:36px;height:36px;border:3px solid rgba(201,168,76,0.2);border-top-color:var(--gold);border-radius:50%;animation:rvt-spin 0.8s linear infinite;"></div>
  </div>
  <style>@keyframes rvt-spin{to{transform:rotate(360deg)}}</style>
</body>
